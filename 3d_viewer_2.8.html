<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>3D Viewer 2.8</title>
<style>
:root {
  --bg: #1a1a2e;
  --panel: #16213e;
  --panel-border: #0f3460;
  --accent: #e94560;
  --accent2: #533483;
  --text: #eaeaea;
  --text-dim: #8892a4;
  --input-bg: #0f1a30;
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'Helvetica Neue',sans-serif; background:var(--bg); color:var(--text); }
#app { display:flex; flex-direction:column; height:100%; width:100%; position:relative; }
#gl { display:block; width:100%; height:100%; touch-action:none; }
#ui {
  background: var(--panel);
  border-top: 2px solid var(--panel-border);
  padding: 12px 14px 20px;
  overflow-y: auto;
  max-height: 35vh;
  -webkit-overflow-scrolling: touch;
}
.st {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--accent); margin: 10px 0 6px;
}
.st:first-child { margin-top: 0; }
.row { display:flex; gap:8px; align-items:center; margin-bottom:6px; flex-wrap:wrap; }
.btn {
  background: var(--accent2); color: #fff; border: none; padding: 9px 14px;
  border-radius: var(--radius); font-size: 13px; font-weight: 600;
  cursor: pointer; flex: 1; text-align: center; transition: background .15s; min-width:0;
}
.btn:active { background: var(--accent); }
.btn.active { background: var(--accent); }
.btn-import {
  background: var(--accent); flex: none; width: 100%; padding: 12px;
  font-size: 14px; margin-bottom: 4px;
}
.btn-folder {
  background: var(--accent2); flex: none; width: 100%; padding: 10px;
  font-size: 13px; margin-bottom: 4px;
}
.hint { font-size:11px; color:var(--text-dim); margin-bottom:6px; line-height:1.4; }
.ag { display:flex; gap:6px; flex:1; align-items:center; }
.ag label { font-size:12px; font-weight:700; color:var(--text-dim); width:16px; }
.ag input {
  flex:1; background: var(--input-bg); border: 1px solid var(--panel-border);
  color: var(--text); border-radius: 6px; padding: 7px 8px; font-size: 13px;
  width: 50px; text-align: center; -webkit-appearance: none;
}
.ag input:focus { outline:none; border-color:var(--accent); }
input[type="file"] { display:none; }
.rot-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.rot-row label { font-size:12px; font-weight:700; color:var(--text-dim); width:14px; flex-shrink:0; }
.rot-row input[type="range"] { flex:1; height:4px; accent-color:var(--accent); }
.rot-num { width:52px; background:var(--card); color:var(--text); border:1px solid #555; border-radius:4px; padding:2px 4px; font-size:12px; text-align:center; }
.clip-row { display:flex; align-items:center; gap:4px; margin-bottom:6px; }
.clip-row label { font-size:12px; font-weight:700; color:var(--text-dim); width:14px; flex-shrink:0; }
.clip-wrap { flex:1; position:relative; height:24px; }
.clip-wrap input[type="range"] { position:absolute; top:0; left:0; width:100%; height:24px; margin:0; pointer-events:none; -webkit-appearance:none; appearance:none; background:transparent; }
.clip-wrap input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; height:16px; width:16px; border-radius:50%; background:var(--accent); pointer-events:all; cursor:pointer; position:relative; z-index:2; }
.clip-wrap .clip-track { position:absolute; top:10px; left:0; right:0; height:4px; background:#555; border-radius:2px; }
.clip-wrap .clip-fill { position:absolute; top:10px; height:4px; background:var(--accent); border-radius:2px; }
.clip-num { width:42px; background:var(--card); color:var(--text); border:1px solid #555; border-radius:4px; padding:2px 2px; font-size:10px; text-align:center; flex-shrink:0; }
.cap-color-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.cap-color-row label { font-size:12px; color:var(--text-dim); }
.cap-color-row input[type="color"] { width:32px; height:20px; border:1px solid #555; border-radius:4px; background:none; cursor:pointer; padding:0; }
#status {
  font-size: 11px; color: var(--text-dim); text-align: center;
  padding: 4px 0; min-height: 18px; word-break: break-all;
}

</style>
</head>
<body>
<div id="app">
  <div id="canvasWrap" style="position:relative;flex:1;overflow:hidden;">
    <canvas id="gl"></canvas>
    <!-- Walk/Fly overlay: inside canvas area -->
    <!-- Heatmap legend (always visible in heat mode) -->
    <canvas id="heatLegend" width="30" height="200" style="display:none;position:absolute;top:10px;right:10px;border:1px solid rgba(255,255,255,0.3);border-radius:4px;pointer-events:none;"></canvas>
    <div id="heatLegendLabels" style="display:none;position:absolute;top:10px;right:44px;height:200px;pointer-events:none;font-size:10px;color:#fff;text-shadow:0 0 3px #000;">
      <div id="heatLMax" style="position:absolute;top:0;right:0;"></div>
      <div id="heatLMid" style="position:absolute;top:50%;right:0;transform:translateY(-50%);"></div>
      <div id="heatLMin" style="position:absolute;bottom:0;right:0;"></div>
    </div>
    <!-- Measure label -->
    <div id="measLabel" style="display:none;position:absolute;padding:2px 6px;background:rgba(0,0,0,0.7);color:#fff;font-size:12px;border-radius:3px;pointer-events:none;white-space:nowrap;"></div>
    <div id="fpOverlay" style="display:none;position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;">
      <div id="joyBase" style="position:absolute;bottom:24px;left:24px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,0.15);border:2px solid rgba(0,0,0,0.25);pointer-events:auto;touch-action:none;">
        <div id="joyKnob" style="position:absolute;width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.65);border:2px solid rgba(0,0,0,0.35);left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;">
          <div style="position:absolute;width:10px;height:10px;border-radius:50%;background:#222;left:50%;top:50%;transform:translate(-50%,-50%);"></div>
        </div>
      </div>
      <div id="hSliderBase" style="display:none;position:absolute;bottom:24px;right:24px;width:50px;height:160px;border-radius:25px;background:rgba(255,255,255,0.15);border:2px solid rgba(0,0,0,0.25);pointer-events:auto;touch-action:none;">
        <div id="hSliderKnob" style="position:absolute;width:42px;height:42px;border-radius:10px;background:rgba(255,255,255,0.65);border:2px solid rgba(0,0,0,0.35);left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;">
          <div style="position:absolute;width:10px;height:10px;border-radius:50%;background:#222;left:50%;top:50%;transform:translate(-50%,-50%);"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="ui">
    <button class="btn btn-import" onclick="document.getElementById('fileInput').click()">
      ファイル選択
    </button>
    <input type="file" id="fileInput" multiple>
    <button class="btn btn-folder" onclick="document.getElementById('folderInput').click()">
      フォルダ選択
    </button>
    <input type="file" id="folderInput" webkitdirectory>
    <div class="hint">ファイル選択→obj/glb, mtl, jpgが同じフォルダ内にあって一括選択可能な場合<br>フォルダ選択→サブフォルダがある or obj/glb, mtlと同じフォルダ内にテクスチャ画像が多い場合</div>
    <div id="status">モデルを読み込んでください</div>

    <div class="st">投影</div>
    <div class="row">
      <button class="btn active" id="projPersp" onclick="setProj('persp')">Persp</button>
      <button class="btn" id="projOrtho" onclick="setProj('ortho')">Ortho</button>
    </div>
    <div id="viewBtns" style="display:none">
      <div class="row">
        <button class="btn" id="vFront" onclick="setView('front')">正面</button>
        <button class="btn" id="vBack" onclick="setView('back')">背面</button>
        <button class="btn" id="vTop" onclick="setView('top')">上面</button>
      </div>
      <div class="row">
        <button class="btn" id="vBottom" onclick="setView('bottom')">下面</button>
        <button class="btn" id="vRight" onclick="setView('right')">右側面</button>
        <button class="btn" id="vLeft" onclick="setView('left')">左側面</button>
      </div>
    </div>

    <div class="st">回転 (度)</div>
    <div class="rot-row"><label>X</label><input type="range" id="rxR" min="-180" max="180" value="0" step="1"><input type="number" id="rx" value="0" step="5" class="rot-num"></div>
    <div class="rot-row"><label>Y</label><input type="range" id="ryR" min="-180" max="180" value="0" step="1"><input type="number" id="ry" value="0" step="5" class="rot-num"></div>
    <div class="rot-row"><label>Z</label><input type="range" id="rzR" min="-180" max="180" value="0" step="1"><input type="number" id="rz" value="0" step="5" class="rot-num"></div>
    <div class="row"><button class="btn" onclick="bakeRotation()">回転を0にセット</button></div>

    <div class="st">光源プローブ</div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;"><label style="font-size:12px;color:var(--text-dim);white-space:nowrap;"><input type="checkbox" id="probeChk"> 光源移動</label></div>
    <div id="probeUI" style="display:none">
      <div class="rot-row"><label style="width:auto;white-space:nowrap;">奥行き</label><input type="range" id="probeDepR" min="0" max="100" value="30" step="1"><input type="number" id="probeDepN" value="3.0" step="0.1" class="rot-num"></div>
      <div class="rot-row"><label style="width:auto;white-space:nowrap;">強さ</label><input type="range" id="probeIntR" min="1" max="100" value="10" step="1"><input type="number" id="probeIntN" value="1.0" step="0.1" class="rot-num"></div>
      <div class="rot-row"><label style="width:auto;white-space:nowrap;">色</label><input type="color" id="probeColor" value="#ffffff" style="width:40px;height:24px;border:none;padding:0;"></div>
    </div>

    <div class="st">マテリアル</div>
    <div class="row">
      <button class="btn active" id="matLit" onclick="setMaterial('lit')">Lit</button>
      <button class="btn" id="matUnlit" onclick="setMaterial('unlit')">Unlit</button>
      <button class="btn" id="matMatcap" onclick="setMaterial('matcap')">Matcap</button>
      <button class="btn" id="matHeat" onclick="setMaterial('heat')">Heat</button>
    </div>
    <div id="heatSection" style="display:none">
      <div class="row">
        <button class="btn active" id="hmHeight" onclick="setHeatMode(1)">高さ</button>
        <button class="btn" id="hmSlope" onclick="setHeatMode(2)">傾斜</button>
        <button class="btn" id="hmCurv" onclick="setHeatMode(3)">曲率</button>
      </div>
      <div class="row">
        <button class="btn active" id="rpRainbow" onclick="setHeatRamp(0)">虹</button>
        <button class="btn" id="rpWarmCool" onclick="setHeatRamp(1)">寒暖</button>
        <button class="btn" id="rpMono" onclick="setHeatRamp(2)">白黒</button>
        <label id="monoInvLabel" style="display:none;font-size:11px;color:var(--text-dim);cursor:pointer;margin-left:2px"><input type="checkbox" id="monoInv" style="margin:0 3px;vertical-align:middle">反転</label>
      </div>
      <div id="heatRangeUI">
        <div class="rot-row"><label>Min</label><input type="range" id="hMinR" min="0" max="100" value="0" step="1"><input type="number" id="hMinN" value="0" step="0.1" class="rot-num"></div>
        <div class="rot-row"><label>Max</label><input type="range" id="hMaxR" min="0" max="100" value="100" step="1"><input type="number" id="hMaxN" value="1" step="0.1" class="rot-num"></div>
      </div>
      <div id="heatCurvUI" style="display:none">
        <div class="rot-row"><label>感度</label><input type="range" id="hCurvR" min="1" max="200" value="40" step="1"><input type="number" id="hCurvN" value="4.0" step="0.5" class="rot-num"></div>
      </div>
      <div class="rot-row"><label>合成</label><input type="range" id="hBlendR" min="0" max="100" value="100" step="1"><input type="number" id="hBlendN" value="1.00" step="0.05" class="rot-num"></div>
    </div>
    <div class="rot-row"><label>Met</label><input type="range" id="mtlR" min="0" max="100" value="0" step="1"><input type="number" id="mtl" value="0.00" step="0.05" class="rot-num"></div>
    <div class="rot-row"><label>Spc</label><input type="range" id="spcR" min="0" max="100" value="50" step="1"><input type="number" id="spc" value="0.50" step="0.05" class="rot-num"></div>
    <div class="rot-row"><label>Rgh</label><input type="range" id="rghR" min="0" max="100" value="100" step="1"><input type="number" id="rgh" value="1.00" step="0.05" class="rot-num"></div>

    <div id="pbrSection" style="display:none">
      <div class="st">PBR テクスチャ</div>
      <div class="rot-row" id="mtRow" style="display:none"><label style="width:50px">Met.T</label><input type="range" id="mtStr" min="0" max="100" value="100" step="1"><input type="number" id="mtStrN" value="1.00" step="0.05" class="rot-num"></div>
      <div class="rot-row" id="rtRow" style="display:none"><label style="width:50px">Rgh.T</label><input type="range" id="rtStr" min="0" max="100" value="100" step="1"><input type="number" id="rtStrN" value="1.00" step="0.05" class="rot-num"></div>
      <div class="rot-row" id="normRow" style="display:none"><label style="width:50px">Norm</label><input type="range" id="normStr" min="0" max="100" value="100" step="1"><input type="number" id="normStrN" value="1.00" step="0.05" class="rot-num"><label style="margin-left:4px;font-size:11px;color:var(--text-dim);cursor:pointer"><input type="checkbox" id="normFlipY" style="margin:0 2px;vertical-align:middle">FlipY</label></div>
      <div class="rot-row" id="emRow" style="display:none"><label style="width:50px">Emis</label><input type="range" id="emStr" min="0" max="100" value="100" step="1"><input type="number" id="emStrN" value="1.00" step="0.05" class="rot-num"></div>
    </div>

    <div class="st">ライティング</div>
    <div class="row">
      <button class="btn active" id="l1" onclick="setLight(0)">Light 1</button>
      <button class="btn" id="l2" onclick="setLight(1)">Light 2</button>
      <button class="btn" id="l3" onclick="setLight(2)">Light 3</button>
    </div>
    <div class="rot-row"><label>強さ</label><input type="range" id="lIntR" min="0" max="100" value="10" step="1"><input type="number" id="lInt" value="1.00" step="0.1" class="rot-num"></div>

    <div class="st">法線</div>
    <div class="row">
      <button class="btn active" id="nFlat" onclick="setNormals('flat')">Flat</button>
      <button class="btn" id="nSmooth" onclick="setNormals('smooth')">Smooth</button>
    </div>

    <div class="st">カメラ</div>
    <div class="row">
      <button class="btn active" id="camOrbit" onclick="setCamMode('orbit')">Orbit</button>
      <button class="btn" id="camWalk" onclick="setCamMode('walk')">Walk</button>
      <button class="btn" id="camFly" onclick="setCamMode('fly')">Fly</button>
    </div>
    <div id="fpSpeedUI" style="display:none">
      <div class="rot-row"><label>速度</label><input type="range" id="fpSpeedR" min="1" max="100" value="20" step="1"><input type="number" id="fpSpeedN" value="0.20" step="0.05" class="rot-num"></div>
    </div>
    <div id="fpHtUI" style="display:none">
      <div class="rot-row"><label>視点高</label><input type="range" id="fpHtR" min="0" max="100" value="50" step="1"><input type="number" id="fpHtN" value="0.50" step="0.05" class="rot-num"></div>
    </div>

    <div class="st">背景</div>
    <div class="row">
      <button class="btn active" id="bgDark" onclick="setBg('dark')">Dark</button>
      <button class="btn" id="bgBlack" onclick="setBg('black')">Black</button>
      <button class="btn" id="bgGray" onclick="setBg('gray')">Gray</button>
      <button class="btn" id="bgWhite" onclick="setBg('white')">White</button>
      <button class="btn" id="bgChecker" onclick="setBg('checker')">Check</button>
    </div>

    <div class="st">表示</div>
    <div class="row">
      <button class="btn" id="btnWire" onclick="toggleWire()">Wireframe</button>
    </div>
    <div id="wireMixUI" style="display:none">
      <div class="rot-row"><label style="width:auto;white-space:nowrap;">Mix</label><input type="range" id="wireMixR" min="0" max="100" value="100" step="1"><input type="number" id="wireMixN" value="1.0" step="0.1" class="rot-num"></div>
    </div>

    <div class="st">計測</div>
    <div class="row">
      <button class="btn" id="btnMeasure" onclick="toggleMeasure()">計測</button>
      <button class="btn" id="btnMeasClear" onclick="clearMeasure()">クリア</button>
    </div>
    <div id="measResult" style="display:none;padding:2px 8px;font-size:13px;color:#fff;"></div>

    <div class="st">クリッピング</div>
    <div class="clip-row"><label>X</label><div class="clip-wrap"><div class="clip-track"></div><div class="clip-fill" id="cxFill"></div><input type="range" id="cxMin" min="-10" max="10" value="-10" step="0.1"><input type="range" id="cxMax" min="-10" max="10" value="10" step="0.1"></div><input type="number" id="cxMinN" value="-10" step="0.1" class="clip-num"><input type="number" id="cxMaxN" value="10" step="0.1" class="clip-num"></div>
    <div class="clip-row"><label>Y</label><div class="clip-wrap"><div class="clip-track"></div><div class="clip-fill" id="cyFill"></div><input type="range" id="cyMin" min="-10" max="10" value="-10" step="0.1"><input type="range" id="cyMax" min="-10" max="10" value="10" step="0.1"></div><input type="number" id="cyMinN" value="-10" step="0.1" class="clip-num"><input type="number" id="cyMaxN" value="10" step="0.1" class="clip-num"></div>
    <div class="clip-row"><label>Z</label><div class="clip-wrap"><div class="clip-track"></div><div class="clip-fill" id="czFill"></div><input type="range" id="czMin" min="-10" max="10" value="-10" step="0.1"><input type="range" id="czMax" min="-10" max="10" value="10" step="0.1"></div><input type="number" id="czMinN" value="-10" step="0.1" class="clip-num"><input type="number" id="czMaxN" value="10" step="0.1" class="clip-num"></div>
    <div class="cap-color-row"><label>断面色</label><input type="color" id="capColor" value="#808080"></div>

  </div>
</div>

<script>
/* ============================================================
   Debug — persistent crash log (survives tab crash)
   ============================================================ */
(function(){
  // Show previous crash log if exists
  var prev=localStorage.getItem('_v22_crash');
  if(prev){
    var el=document.createElement('div');
    el.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);color:#0f0;font:11px monospace;padding:12px;z-index:99999;overflow-y:auto;white-space:pre-wrap;word-break:break-all;';
    el.textContent='=== 前回のクラッシュログ ===\n'+prev+'\n\n(タップで閉じる)';
    el.onclick=function(){el.remove();};
    document.body.appendChild(el);
    localStorage.removeItem('_v22_crash');
  }
  var log=[];
  window._cl=function(msg){
    log.push(performance.now().toFixed(0)+'ms: '+msg);
    if(log.length>60)log.shift();
    localStorage.setItem('_v22_crash',log.join('\n'));
  };
  window._clDone=function(){localStorage.removeItem('_v22_crash');};
  window.onerror=function(msg,src,line,col,err){
    window._cl('[UNCAUGHT] '+msg+' L'+line+':'+col);
  };
  window.onunhandledrejection=function(e){
    window._cl('[PROMISE] '+(e.reason&&e.reason.message||e.reason||e));
  };
})();

/* ============================================================
   On-screen live log
   ============================================================ */
(function(){
  var el=document.createElement('div');
  el.id='dbg';
  el.style.cssText='position:fixed;bottom:0;left:0;right:0;max-height:40vh;overflow-y:auto;background:rgba(0,0,0,0.85);color:#0f0;font:11px monospace;padding:6px;z-index:9999;display:none;white-space:pre-wrap;word-break:break-all;';
  document.body.appendChild(el);
  var btn=document.createElement('button');
  btn.textContent='Log';
  btn.style.cssText='position:fixed;bottom:4px;right:4px;z-index:10000;font:10px sans-serif;padding:2px 8px;opacity:0.6;';
  btn.onclick=function(){el.style.display=el.style.display==='none'?'block':'none';};
  document.body.appendChild(btn);
  window._dbg=function(msg){
    el.style.display='block';
    el.textContent=(el.textContent+msg+'\n').split('\n').slice(-80).join('\n');
    el.scrollTop=el.scrollHeight;
  };
  var origErr=console.error, origWarn=console.warn;
  console.error=function(){origErr.apply(console,arguments);var m=Array.from(arguments).join(' ');window._dbg('[ERR] '+m);window._cl('[ERR] '+m);};
  console.warn=function(){origWarn.apply(console,arguments);var m=Array.from(arguments).join(' ');window._dbg('[WARN] '+m);window._cl('[WARN] '+m);};
})();

/* ============================================================
   WebGL
   ============================================================ */
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl', {antialias:true, alpha:false, stencil:true});
if(!gl) alert('WebGL not supported');
gl.getExtension('OES_element_index_uint');
gl.getExtension('OES_standard_derivatives');
canvas.addEventListener('webglcontextlost',function(e){e.preventDefault();document.getElementById('status').textContent='WebGLコンテキスト喪失 - ページをリロードしてください';});
canvas.addEventListener('webglcontextrestored',function(){location.reload();});

function resize(){
  const dpr=window.devicePixelRatio||1, r=canvas.getBoundingClientRect();
  canvas.width=r.width*dpr; canvas.height=r.height*dpr;
  gl.viewport(0,0,canvas.width,canvas.height);
}
window.addEventListener('resize',resize); resize();

/* ============================================================
   Math
   ============================================================ */

const FS_LIT=`
#extension GL_OES_standard_derivatives : enable
precision mediump float;
varying vec3 vN,vW,vV,vPos; varying vec2 vUV;
varying float vCurv;
uniform vec3 uLD[3],uLC[3],uAmb,uKd;
uniform sampler2D uTex; uniform int uHasTex;
uniform sampler2D uMRTex; uniform int uHasMR;
uniform sampler2D uNormTex; uniform int uHasNorm;
uniform sampler2D uEmTex; uniform int uHasEm;
uniform float uMetal,uSpec,uRough;
uniform float uMetTexStr,uRghTexStr,uNormStr,uEmStr;
uniform float uNormFlipY;
uniform vec3 uClipMin,uClipMax;
uniform int uFlatShade;
// Heatmap
uniform int uHeatMode; // 0=off 1=height 2=slope 3=curvature
uniform float uHeatMin,uHeatMax;
uniform int uRampType;
uniform float uHeatBlend; // 0=base only, 1=heat only
uniform float uCurvSens; // curvature sensitivity
uniform int uMonoInvert; // invert monochrome
uniform int uProbeOn;
uniform vec3 uProbePos;

vec3 rampRainbow(float t){
  float r=smoothstep(0.5,0.75,t)+smoothstep(0.9,1.0,t)*0.5;
  float g=smoothstep(0.0,0.25,t)-smoothstep(0.75,1.0,t);
  float b=1.0-smoothstep(0.25,0.5,t);
  return clamp(vec3(r,g,b),0.0,1.0);
}
vec3 rampWarmCool(float t){
  vec3 cool=vec3(0.1,0.2,0.8), mid=vec3(0.95), warm=vec3(0.8,0.1,0.1);
  return t<0.5?mix(cool,mid,t*2.0):mix(mid,warm,(t-0.5)*2.0);
}

void main(){
  if(vPos.x<uClipMin.x||vPos.x>uClipMax.x||vPos.y<uClipMin.y||vPos.y>uClipMax.y||vPos.z<uClipMin.z||vPos.z>uClipMax.z) discard;
  vec3 n;
  vec3 geoN=normalize(cross(dFdx(vW),dFdy(vW))); // always geometry-based
  if(uFlatShade==1){
    n=geoN;
  } else {
    n=normalize(vN);
  }
  vec3 v=normalize(vV);
  if(uHasNorm==1){
    vec3 nm=texture2D(uNormTex,vUV).rgb*2.0-1.0;
    nm.y*=uNormFlipY;
    nm.xy*=uNormStr;
    vec3 dp1=dFdx(vW), dp2=dFdy(vW);
    vec2 duv1=dFdx(vUV), duv2=dFdy(vUV);
    float d=duv1.x*duv2.y-duv1.y*duv2.x;
    vec3 T=normalize((dp1*duv2.y-dp2*duv1.y)/max(abs(d),1e-6));
    vec3 B=normalize(cross(n,T));
    n=normalize(T*nm.x+B*nm.y+n*nm.z);
  }
  vec3 baseColor=(uHasTex==1)?texture2D(uTex,vUV).rgb:uKd;

  // Heatmap color replacement
  if(uHeatMode>0){
    float val=0.0;
    if(uHeatMode==1){
      val=(vW.y-uHeatMin)/(uHeatMax-uHeatMin+1e-6);
    } else if(uHeatMode==2){
      val=1.0-abs(n.y);
    } else if(uHeatMode==3){
      // Geometry curvature (CPU Laplacian) + normal map contribution
      float nmContrib=length(geoN-n);
      val=clamp((vCurv+nmContrib)*uCurvSens,0.0,1.0);
    }
    val=clamp(val,0.0,1.0);
    if(uMonoInvert==1 && uRampType==2) val=1.0-val;
    vec3 hc;
    if(uRampType==1) hc=rampWarmCool(val);
    else if(uRampType==2) hc=vec3(val);

  roughVal=mix(roughVal,1.0,heatSuppress);

    color+=texture2D(uEmTex,vUV).rgb*uEmStr;

}`;

function isPow2(v){return(v&(v-1))===0;}
const MAX_TEX_SIZE=gl.getParameter(gl.MAX_TEXTURE_SIZE)||4096;
const TEX_LIMIT=Math.min(MAX_TEX_SIZE,2048); // cap at 2048 for mobile memory safety

function mkTex(img,flipY){
  if(flipY===undefined) flipY=true;
  // Downscale if too large
  var w=img.width, h=img.height;
  if(w>TEX_LIMIT||h>TEX_LIMIT){
    var scale=TEX_LIMIT/Math.max(w,h);
    var nw=Math.floor(w*scale), nh=Math.floor(h*scale);
    _cl('mkTex: downscale '+w+'x'+h+' -> '+nw+'x'+nh);
    var cv=document.createElement('canvas');cv.width=nw;cv.height=nh;
    var cx=cv.getContext('2d');
    cx.drawImage(img,0,0,nw,nh);
    img=cv;
  }
  const t=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,t);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,flipY);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,false);
  if(isPow2(img.width)&&isPow2(img.height)){
    gl.generateMipmap(gl.TEXTURE_2D);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR_MIPMAP_LINEAR);
  } else {
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  }
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  return t;
}

/* ============================================================
   MTL Parser — preserves full relative path from map_Kd
   ============================================================ */
function parseMTL(text){
  const mats={};let cur=null;
  for(const raw of text.split('\n')){
    const line=raw.trim();
    if(!line||line[0]==='#')continue;
    const toks=line.split(/\s+/);
    const cmd=toks[0];
    if(cmd==='newmtl'){
      cur=toks.slice(1).join(' ');
      mats[cur]={Kd:[.8,.8,.8],map_Kd:null,map_Kd_raw:null};
    } else if(cur){
      if(cmd==='Kd'&&toks.length>=4) mats[cur].Kd=[+toks[1],+toks[2],+toks[3]];
      else if(cmd==='map_Kd'){
        // map_Kd may have options like -s 1 1 1 -o 0 0 0 before the filename
        // skip option flags and their arguments, take the remaining as path
        let i=1;
        while(i<toks.length){
          if(toks[i].startsWith('-')){
            // skip flag and its value(s): most flags have 1-3 numeric args
            i++;
            while(i<toks.length && !isNaN(+toks[i])) i++;
          } else break;
        }
        const rawPath = toks.slice(i).join(' ') || toks[toks.length-1];
        // Normalize path separators to /
        const normalized = rawPath.replace(/\\/g,'/');
        mats[cur].map_Kd_raw = normalized;
        // Also store just the filename for fallback matching
        const parts = normalized.split('/');
        mats[cur].map_Kd = parts[parts.length-1];
      }
    }
  }
  return mats;
}

/* ============================================================
   OBJ Parser
   ============================================================ */
function parseOBJ(text,materials){
  const pos=[],nor=[],uvs=[];
  const groups={};
  let cur='__default';
  groups[cur]={P:[],N:[],U:[]};
  let mtlLib=null;

  for(const raw of text.split('\n')){
    const line=raw.trim();
    if(!line||line[0]==='#')continue;
    const toks=line.split(/\s+/);
    const cmd=toks[0];
    if(cmd==='mtllib') mtlLib=toks.slice(1).join(' ');
    else if(cmd==='v') pos.push([+toks[1],+toks[2],+toks[3]]);
    else if(cmd==='vn') nor.push([+toks[1],+toks[2],+toks[3]]);
    else if(cmd==='vt') uvs.push([+toks[1],+toks[2]]);
    else if(cmd==='usemtl'){
      cur=toks.slice(1).join(' ');
      if(!groups[cur]) groups[cur]={P:[],N:[],U:[]};
    }
    else if(cmd==='f'){
      const verts=toks.slice(1).map(v=>{
        const s=v.split('/');
        return{p:(+s[0])-1, t:s[1]&&s[1]!==''?(+s[1])-1:-1, n:s[2]&&s[2]!==''?(+s[2])-1:-1};
      });
      const g=groups[cur];
      for(let i=1;i<verts.length-1;i++){
        for(const vi of [verts[0],verts[i],verts[i+1]]){
          const pp=pos[vi.p]||[0,0,0];
          g.P.push(pp[0],pp[1],pp[2]);
          if(vi.t>=0&&uvs[vi.t]) g.U.push(uvs[vi.t][0],uvs[vi.t][1]);
          else g.U.push(0,0);
          if(vi.n>=0&&nor[vi.n]) g.N.push(nor[vi.n][0],nor[vi.n][1],nor[vi.n][2]);
          else g.N.push(0,0,0);
        }
      }
    }
  }

  // Flat normals if missing
  const hasN=nor.length>0;
  for(const k in groups){
    const g=groups[k];
    if(!hasN&&g.P.length>0){
      for(let i=0;i<g.P.length;i+=9){
        const ax=g.P[i+3]-g.P[i],ay=g.P[i+4]-g.P[i+1],az=g.P[i+5]-g.P[i+2];
        const bx=g.P[i+6]-g.P[i],by=g.P[i+7]-g.P[i+1],bz=g.P[i+8]-g.P[i+2];
        let nx=ay*bz-az*by,ny=az*bx-ax*bz,nz=ax*by-ay*bx;
        const l=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;nx/=l;ny/=l;nz/=l;
        for(let j=0;j<3;j++){g.N[i+j*3]=nx;g.N[i+j*3+1]=ny;g.N[i+j*3+2]=nz;}
      }
    }
  }

  // Bounding box
  let x0=Infinity,y0=Infinity,z0=Infinity,x1=-Infinity,y1=-Infinity,z1=-Infinity;
  for(const k in groups){
    const P=groups[k].P;
    for(let i=0;i<P.length;i+=3){
      if(P[i]<x0)x0=P[i];if(P[i]>x1)x1=P[i];
      if(P[i+1]<y0)y0=P[i+1];if(P[i+1]>y1)y1=P[i+1];
      if(P[i+2]<z0)z0=P[i+2];if(P[i+2]>z1)z1=P[i+2];
    }
  }
  const cx=(x0+x1)/2,cy=(y0+y1)/2,cz=(z0+z1)/2;
  const span=Math.max(x1-x0,y1-y0,z1-z0)||1,sc=2/span;

  const result=[];let tot=0;
  for(const k in groups){
    const g=groups[k];
    if(g.P.length===0)continue;
    for(let i=0;i<g.P.length;i+=3){g.P[i]=(g.P[i]-cx)*sc;g.P[i+1]=(g.P[i+1]-cy)*sc;g.P[i+2]=(g.P[i+2]-cz)*sc;}
    const cnt=g.P.length/3; tot+=cnt;
    const mat=materials[k]||null;
    result.push({
      positions:new Float32Array(g.P), normals:new Float32Array(g.N), uvs:new Float32Array(g.U),
      count:cnt,
      kd:mat?mat.Kd:[.8,.8,.8],
      mapFile:mat?mat.map_Kd:null,        // filename only
      mapFileRaw:mat?mat.map_Kd_raw:null,  // full relative path from MTL
      matName:k
    });
  }
  return{groups:result, totalVerts:tot, mtlLib, sc};
}

/* ============================================================
   GLB Parser — indexed rendering, minimal memory
   ============================================================ */
function readBuf(f){return new Promise((r,j)=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.onerror=()=>j(fr.error);fr.readAsArrayBuffer(f);});}

async function parseGLB(file){
  const buf=await readBuf(file);
  const dv=new DataView(buf);
  if(dv.getUint32(0,true)!==0x46546C67) throw new Error('Not a GLB file');

  let off=12, jsonStr=null, binOff=0;
  while(off<buf.byteLength){
    const len=dv.getUint32(off,true), type=dv.getUint32(off+4,true);
    if(type===0x4E4F534A) jsonStr=new TextDecoder().decode(new Uint8Array(buf,off+8,len));
    else if(type===0x004E4942) binOff=off+8;
    off+=8+len;
  }
  if(!jsonStr) throw new Error('No JSON chunk');
  const gltf=JSON.parse(jsonStr); jsonStr=null;

  function accInfo(idx){
    const acc=gltf.accessors[idx], bv=gltf.bufferViews[acc.bufferView];
    const ct=acc.componentType, tc={'SCALAR':1,'VEC2':2,'VEC3':3,'VEC4':4}[acc.type]||1;
    return{offset:binOff+(bv.byteOffset||0)+(acc.byteOffset||0), count:acc.count, ct, tc, stride:bv.byteStride||0};
  }

  function readFloats(info){
    const n=info.count*info.tc, s=info.stride||(info.tc*4);
    if(!info.stride || info.stride===info.tc*4){
      if(info.ct===5126) return new Float32Array(buf,info.offset,n);
    }
    const out=new Float32Array(n);
    for(let i=0;i<info.count;i++){
      const o=info.offset+i*s;
      for(let j=0;j<info.tc;j++) out[i*info.tc+j]=dv.getFloat32(o+j*4,true);
    }
    return out;
  }

  function getTexImage(texIdx){
    if(texIdx==null||!gltf.textures||!gltf.images) return null;
    const texDef=gltf.textures[texIdx]; if(!texDef) return null;
    const imgDef=gltf.images[texDef.source]; if(!imgDef) return null;
    if(imgDef.bufferView!=null){
      const bv=gltf.bufferViews[imgDef.bufferView];
      // Return blob (not promise) for lazy sequential decode
      return new Blob([new Uint8Array(buf,binOff+(bv.byteOffset||0),bv.byteLength)],{type:imgDef.mimeType||'image/png'});
    }
    return null;
  }

  const results=[], meshes=gltf.meshes||[], mats=gltf.materials||[];
  let totalVerts=0;

  // Bounding box
  let x0=Infinity,y0=Infinity,z0=Infinity,x1=-Infinity,y1=-Infinity,z1=-Infinity;
  for(const mesh of meshes) for(const prim of mesh.primitives){
    if(prim.mode!=null&&prim.mode!==4) continue;
    const pi=accInfo(prim.attributes.POSITION), s=pi.stride||12;
    for(let i=0;i<pi.count;i++){
      const o=pi.offset+i*s;
      const px=dv.getFloat32(o,true),py=dv.getFloat32(o+4,true),pz=dv.getFloat32(o+8,true);
      if(px<x0)x0=px;if(px>x1)x1=px;if(py<y0)y0=py;if(py>y1)y1=py;if(pz<z0)z0=pz;if(pz>z1)z1=pz;
    }
  }
  const cx=(x0+x1)/2,cy=(y0+y1)/2,cz=(z0+z1)/2,span=Math.max(x1-x0,y1-y0,z1-z0)||1,sc=2/span;

  for(let mi=0;mi<meshes.length;mi++){
    for(const prim of meshes[mi].primitives){
      if(prim.mode!=null&&prim.mode!==4) continue;
      const pi=accInfo(prim.attributes.POSITION), s=pi.stride||12;

      // Positions — normalize
      const pos=new Float32Array(pi.count*3);
      for(let i=0;i<pi.count;i++){
        const o=pi.offset+i*s;
        pos[i*3]=(dv.getFloat32(o,true)-cx)*sc;
        pos[i*3+1]=(dv.getFloat32(o+4,true)-cy)*sc;
        pos[i*3+2]=(dv.getFloat32(o+8,true)-cz)*sc;
      }

      const norm=prim.attributes.NORMAL!=null?readFloats(accInfo(prim.attributes.NORMAL)):new Float32Array(pi.count*3);
      const uv=prim.attributes.TEXCOORD_0!=null?readFloats(accInfo(prim.attributes.TEXCOORD_0)):new Float32Array(pi.count*2);

      // Indices
      let idxArr=null, idxType=0, drawCount=pi.count;
      if(prim.indices!=null){
        const ii=accInfo(prim.indices);
        if(ii.ct===5123) idxArr=new Uint16Array(buf,ii.offset,ii.count);
        else if(ii.ct===5125) idxArr=new Uint32Array(buf,ii.offset,ii.count);
        else if(ii.ct===5121){const u8=new Uint8Array(buf,ii.offset,ii.count);idxArr=new Uint16Array(ii.count);for(let i=0;i<ii.count;i++)idxArr[i]=u8[i];}
        idxType=ii.ct===5125?5125:5123;
        drawCount=ii.count;
      }

      // Flat normals if no NORMAL attribute
      if(prim.attributes.NORMAL==null){
        if(idxArr){
          // Indexed: compute per-face normal, assign to each vertex
          for(let i=0;i<idxArr.length;i+=3){
            const i0=idxArr[i],i1=idxArr[i+1],i2=idxArr[i+2];
            const ax=pos[i1*3]-pos[i0*3],ay=pos[i1*3+1]-pos[i0*3+1],az=pos[i1*3+2]-pos[i0*3+2];
            const bx=pos[i2*3]-pos[i0*3],by=pos[i2*3+1]-pos[i0*3+1],bz=pos[i2*3+2]-pos[i0*3+2];
            let nx=ay*bz-az*by,ny=az*bx-ax*bz,nz=ax*by-ay*bx;
            const l=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;nx/=l;ny/=l;nz/=l;
            // Accumulate for smooth-ish result
            for(const vi of[i0,i1,i2]){norm[vi*3]+=nx;norm[vi*3+1]+=ny;norm[vi*3+2]+=nz;}
          }
          // Normalize accumulated
          for(let i=0;i<norm.length;i+=3){
            const l=Math.sqrt(norm[i]*norm[i]+norm[i+1]*norm[i+1]+norm[i+2]*norm[i+2])||1;
            norm[i]/=l;norm[i+1]/=l;norm[i+2]/=l;
          }
        } else {
          // Non-indexed: flat normals per triangle
          for(let i=0;i<pos.length;i+=9){
            const ax=pos[i+3]-pos[i],ay=pos[i+4]-pos[i+1],az=pos[i+5]-pos[i+2];
            const bx=pos[i+6]-pos[i],by=pos[i+7]-pos[i+1],bz=pos[i+8]-pos[i+2];
            let nx=ay*bz-az*by,ny=az*bx-ax*bz,nz=ax*by-ay*bx;
            const l=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;nx/=l;ny/=l;nz/=l;
            for(let j=0;j<3;j++){norm[i+j*3]=nx;norm[i+j*3+1]=ny;norm[i+j*3+2]=nz;}
          }
        }
      }

      let kd=[.8,.8,.8],texPromise=null,matName='mesh'+mi;
      let mrTexPromise=null, normTexPromise=null, emTexPromise=null;
      let metalFactor=0, roughFactor=1, emissiveFactor=[0,0,0];
      if(prim.material!=null&&mats[prim.material]){
        const mat=mats[prim.material]; matName=mat.name||matName;
        if(mat.pbrMetallicRoughness){
          const pbr=mat.pbrMetallicRoughness;
          if(pbr.baseColorFactor) kd=[pbr.baseColorFactor[0],pbr.baseColorFactor[1],pbr.baseColorFactor[2]];
          if(pbr.baseColorTexture) texPromise=getTexImage(pbr.baseColorTexture.index);
          if(pbr.metallicRoughnessTexture) mrTexPromise=getTexImage(pbr.metallicRoughnessTexture.index);
          if(pbr.metallicFactor!=null) metalFactor=pbr.metallicFactor;
          if(pbr.roughnessFactor!=null) roughFactor=pbr.roughnessFactor;
        }
        if(mat.normalTexture) normTexPromise=getTexImage(mat.normalTexture.index);
        if(mat.emissiveTexture) emTexPromise=getTexImage(mat.emissiveTexture.index);
        if(mat.emissiveFactor) emissiveFactor=mat.emissiveFactor;
      }
      totalVerts+=drawCount;
      results.push({positions:pos,normals:norm,uvs:uv,count:pi.count,drawCount,idxArr,idxType,kd,matName,texBlob:texPromise,mrTexBlob:mrTexPromise,normTexBlob:normTexPromise,emTexBlob:emTexPromise,metalFactor,roughFactor,emissiveFactor,mapFile:null,mapFileRaw:null});
    }
  }
  return{groups:results,totalVerts,sc};
}

/* ============================================================
   Upload to GPU
   ============================================================ */
function upload(groups){
  for(const mg of meshGroups){gl.deleteBuffer(mg.pb);gl.deleteBuffer(mg.nb);gl.deleteBuffer(mg.ub);if(mg.cb)gl.deleteBuffer(mg.cb);if(mg.tex&&mg.tex!==defTex)gl.deleteTexture(mg.tex);if(mg.mrTex)gl.deleteTexture(mg.mrTex);if(mg.normTex)gl.deleteTexture(mg.normTex);if(mg.emTex)gl.deleteTexture(mg.emTex);if(mg.snb)gl.deleteBuffer(mg.snb);if(mg.ib)gl.deleteBuffer(mg.ib);if(mg.wib)gl.deleteBuffer(mg.wib);}
  meshGroups=[];
  for(const g of groups){
    const pb=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,pb);gl.bufferData(gl.ARRAY_BUFFER,g.positions,gl.STATIC_DRAW);
    const nb=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,nb);gl.bufferData(gl.ARRAY_BUFFER,g.normals,gl.STATIC_DRAW);
    const ub=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,ub);gl.bufferData(gl.ARRAY_BUFFER,g.uvs,gl.STATIC_DRAW);
    // Smooth normals (skip for large meshes)
    let snb=null, snData=null;
    if(g.positions.length/3<200000){
      snData=computeSmoothNormals(g.positions,g.normals);
      snb=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,snb);gl.bufferData(gl.ARRAY_BUFFER,snData,gl.STATIC_DRAW);
    }
    // Curvature (Laplacian, CPU-computed)
    let cb=null;
    if(g.positions.length/3<500000){
      const cv=computeCurvature(g.positions,g.idxArr||null);
      cb=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,cb);gl.bufferData(gl.ARRAY_BUFFER,cv,gl.STATIC_DRAW);
    }
    // Index buffer
    let ib=null,ibType=0,drawCount=g.count;
    if(g.idxArr){
      ib=gl.createBuffer();gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,ib);
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,g.idxArr,gl.STATIC_DRAW);
      ibType=g.idxType===5125?gl.UNSIGNED_INT:gl.UNSIGNED_SHORT;
      drawCount=g.drawCount;
    }
    // Wireframe line index buffer (skip for large meshes)
    let wib=null,wibCount=0,wibType=0;
    const triCount=ib?(drawCount/3):(g.count/3);
    if(triCount<=100000){
      const lineCount=triCount*6;
      const use32=g.count>65535;
      const lines=use32?new Uint32Array(lineCount):new Uint16Array(lineCount);
      for(let i=0;i<triCount;i++){
        const i0=ib?g.idxArr[i*3]:i*3, i1=ib?g.idxArr[i*3+1]:i*3+1, i2=ib?g.idxArr[i*3+2]:i*3+2;
        const o=i*6; lines[o]=i0;lines[o+1]=i1;lines[o+2]=i1;lines[o+3]=i2;lines[o+4]=i2;lines[o+5]=i0;
      }
      wib=gl.createBuffer();gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,wib);
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,lines,gl.STATIC_DRAW);
      wibCount=lineCount; wibType=use32?gl.UNSIGNED_INT:gl.UNSIGNED_SHORT;
    }
    meshGroups.push({pb,nb,snb,cb,ub,ib,ibType,count:g.count,drawCount:drawCount,wib,wibCount,wibType,tex:null,mrTex:null,normTex:null,emTex:null,kd:g.kd,mapFile:g.mapFile,mapFileRaw:g.mapFileRaw,matName:g.matName,_pos:g.positions,_norm:g.normals,_snorm:snData,_idx:g.idxArr||null,_texBlob:g.texBlob||null,_mrTexBlob:g.mrTexBlob||null,_normTexBlob:g.normTexBlob||null,_emTexBlob:g.emTexBlob||null});
  }
  // Compute bounding box
  modelBBox=[Infinity,Infinity,Infinity,-Infinity,-Infinity,-Infinity];
  for(const mg of meshGroups){
    const p=mg._pos;
    for(let i=0;i<p.length;i+=3){
      if(p[i]<modelBBox[0])modelBBox[0]=p[i];
      if(p[i+1]<modelBBox[1])modelBBox[1]=p[i+1];
      if(p[i+2]<modelBBox[2])modelBBox[2]=p[i+2];
      if(p[i]>modelBBox[3])modelBBox[3]=p[i];
      if(p[i+1]>modelBBox[4])modelBBox[4]=p[i+1];
      if(p[i+2]>modelBBox[5])modelBBox[5]=p[i+2];
    }
  }
  // Reset clip sliders to full range
  ['cxMin','cyMin','czMin'].forEach(id=>{document.getElementById(id).value=-10;});
  ['cxMax','cyMax','czMax'].forEach(id=>{document.getElementById(id).value=10;});
  ['cxMinN','cyMinN','czMinN'].forEach(id=>{document.getElementById(id).value='-10.0';});
  ['cxMaxN','cyMaxN','czMaxN'].forEach(id=>{document.getElementById(id).value='10.0';});
  updateClip();
}

function computeSmoothNormals(positions,normals){
  // Hash vertex positions, accumulate normals, then normalize
  const map=new Map();
  const n=positions.length/3;
  // Round to avoid floating point mismatch
  function key(i){
    const x=Math.round(positions[i*3]*1e4);
    const y=Math.round(positions[i*3+1]*1e4);
    const z=Math.round(positions[i*3+2]*1e4);
    return x+','+y+','+z;
  }
  // Accumulate
  for(let i=0;i<n;i++){
    const k=key(i);
    if(!map.has(k)) map.set(k,[0,0,0]);
    const a=map.get(k);
    a[0]+=normals[i*3];
    a[1]+=normals[i*3+1];
    a[2]+=normals[i*3+2];
  }
  // Normalize accumulated
  for(const[k,a] of map){
    const l=Math.sqrt(a[0]*a[0]+a[1]*a[1]+a[2]*a[2])||1;
    a[0]/=l; a[1]/=l; a[2]/=l;
  }
  // Write out
  const out=new Float32Array(positions.length);
  for(let i=0;i<n;i++){
    const a=map.get(key(i));
    out[i*3]=a[0]; out[i*3+1]=a[1]; out[i*3+2]=a[2];
  }
  return out;
}

function computeCurvature(positions,idxArr){
  var nVerts=positions.length/3;
  // Step 1: hash positions to find spatially unique vertices
  var key2uid={}, vert2uid=new Int32Array(nVerts), uidCount=0, uidPos=[];
  for(var i=0;i<nVerts;i++){
    var x=positions[i*3],y=positions[i*3+1],z=positions[i*3+2];
    var k=Math.round(x*1e4)+','+Math.round(y*1e4)+','+Math.round(z*1e4);
    if(k in key2uid){ vert2uid[i]=key2uid[k]; }
    else { vert2uid[i]=uidCount; key2uid[k]=uidCount; uidPos.push(x,y,z); uidCount++; }
  }
  // Step 2: build adjacency on unique vertices
  var adj=new Array(uidCount);
  for(var i=0;i<uidCount;i++) adj[i]=[];
  var nTris=idxArr?idxArr.length/3:nVerts/3;
  for(var t=0;t<nTris;t++){
    var i0,i1,i2;
    if(idxArr){i0=idxArr[t*3];i1=idxArr[t*3+1];i2=idxArr[t*3+2];}
    else{i0=t*3;i1=t*3+1;i2=t*3+2;}
    var a=vert2uid[i0],b=vert2uid[i1],c=vert2uid[i2];
    if(a!==b){if(adj[a].indexOf(b)<0)adj[a].push(b);if(adj[b].indexOf(a)<0)adj[b].push(a);}
    if(a!==c){if(adj[a].indexOf(c)<0)adj[a].push(c);if(adj[c].indexOf(a)<0)adj[c].push(a);}
    if(b!==c){if(adj[b].indexOf(c)<0)adj[b].push(c);if(adj[c].indexOf(b)<0)adj[c].push(b);}
  }
  // Step 3: Laplacian curvature per unique vertex
  var uCurv=new Float32Array(uidCount);
  for(var i=0;i<uidCount;i++){
    var nb=adj[i]; if(nb.length===0)continue;
    var ax=0,ay=0,az=0;
    for(var j=0;j<nb.length;j++){
      ax+=uidPos[nb[j]*3]; ay+=uidPos[nb[j]*3+1]; az+=uidPos[nb[j]*3+2];
    }
    var cnt=nb.length;
    var dx=uidPos[i*3]-ax/cnt, dy=uidPos[i*3+1]-ay/cnt, dz=uidPos[i*3+2]-az/cnt;
    uCurv[i]=Math.sqrt(dx*dx+dy*dy+dz*dz);
  }
  // Step 4: map back to per-vertex
  var result=new Float32Array(nVerts);
  for(var i=0;i<nVerts;i++) result[i]=uCurv[vert2uid[i]];
  _cl('computeCurvature: '+uidCount+' unique verts, '+nTris+' tris');
  return result;
}

/* ============================================================
   Smart file finder — builds lookup indices for fast matching
   ============================================================ */
function buildFileLookup(files){
  // For each file, store multiple lookup keys:
  //  - full webkitRelativePath (lowercased, / separated)
  //  - path without first folder (since folder select prepends root folder name)
  //  - filename only
  // Returns { byPath: {}, byRelPath: {}, byName: {} }
  const byPath={}, byRelPath={}, byName={};

  for(const f of files){
    const relPath = (f.webkitRelativePath || f.name).replace(/\\/g,'/');
    const nameLo = f.name.toLowerCase();
    const relLo = relPath.toLowerCase();

    // Full relative path
    byPath[relLo] = f;

    // Relative path without the root folder (e.g. "MyFolder/textures/a.jpg" -> "textures/a.jpg")
    const slashIdx = relLo.indexOf('/');
    if(slashIdx>=0){
      const sub = relLo.substring(slashIdx+1);
      byRelPath[sub] = f;
      // Also store further subpaths for deeply nested
      // e.g. "textures/sub/a.jpg" -> also index "sub/a.jpg"
      let p = sub;
      while(true){
        const si = p.indexOf('/');
        if(si<0) break;
        p = p.substring(si+1);
        if(p) byRelPath[p] = byRelPath[p] || f; // first match wins
      }
    }

    // Just filename
    byName[nameLo] = f;
  }

  return{byPath, byRelPath, byName};
}

function findFile(lookup, mapFileRaw, mapFile){
  // mapFileRaw = full relative path from MTL (e.g. "textures/diffuse.jpg" or "../tex/a.png")
  // mapFile = filename only (e.g. "diffuse.jpg")
  // Strategy: try multiple matching approaches, return first hit

  if(mapFileRaw){
    const raw = mapFileRaw.toLowerCase().replace(/\\/g,'/');
    // Remove leading ../ or ./
    const cleaned = raw.replace(/^(\.\.\/|\.\/)+/g,'');

    // 1. Try exact relative path match
    if(lookup.byPath[cleaned]) return {file:lookup.byPath[cleaned], method:'fullpath'};
    if(lookup.byRelPath[cleaned]) return {file:lookup.byRelPath[cleaned], method:'relpath'};

    // 2. Try partial path match (e.g. "textures/a.jpg" matches "root/textures/a.jpg")
    if(lookup.byRelPath[cleaned]) return {file:lookup.byRelPath[cleaned], method:'relpath'};
  }

  // 3. Filename-only match
  if(mapFile){
    const fn = mapFile.toLowerCase();
    if(lookup.byName[fn]) return {file:lookup.byName[fn], method:'name'};
  }

  return null;
}

  if(!files.length)return;
  handleFiles(files);
});

async function handleFiles(files){
  if(!files.length)return;
  const status=document.getElementById('status');
  status.textContent='読み込み中...';

  // Check for GLB
  let glbFile=null;
  for(const f of files){ if(f.name.toLowerCase().endsWith('.glb')){glbFile=f;break;} }

  if(glbFile){
    try{
      _cl('GLB: parse start');
      const parsed=await parseGLB(glbFile);
      _cl('GLB: parsed, groups='+parsed.groups.length+' verts='+parsed.totalVerts);
      modelSc=parsed.sc;
      upload(parsed.groups);
      _cl('GLB: upload done, meshGroups='+meshGroups.length);
      let texOK=0, pbrTexOK=0;

      // Sequential decode helper - one image at a time to avoid OOM
      async function decodeTex(blob,label){
        var bmp=await createImageBitmap(blob);
        var w=bmp.width, h=bmp.height;
        if(w>TEX_LIMIT||h>TEX_LIMIT){
          var scale=TEX_LIMIT/Math.max(w,h);
          var nw=Math.floor(w*scale), nh=Math.floor(h*scale);
          _cl(label+': downscale '+w+'x'+h+' -> '+nw+'x'+nh);
          var cv=document.createElement('canvas');cv.width=nw;cv.height=nh;
          cv.getContext('2d').drawImage(bmp,0,0,nw,nh);
          bmp.close();
          var t=mkTex(cv,false);
          cv.width=cv.height=1; // release canvas memory
          return t;
        }
        _cl(label+': '+w+'x'+h);
        var t=mkTex(bmp,false);
        bmp.close();
        return t;
      }

      for(var ti=0;ti<meshGroups.length;ti++){
        var mg=meshGroups[ti];
        _cl('GLB: tex group '+ti+' base='+(!!mg._texBlob)+' mr='+(!!mg._mrTexBlob)+' norm='+(!!mg._normTexBlob)+' em='+(!!mg._emTexBlob));
        try{
          if(mg._texBlob){
            try{mg.tex=await decodeTex(mg._texBlob,'base');mg._texBlob=null;texOK++;}catch(e){console.warn('baseColor tex fail:',e);}
          }
          if(mg._mrTexBlob){
            try{mg.mrTex=await decodeTex(mg._mrTexBlob,'MR');mg._mrTexBlob=null;pbrTexOK++;}catch(e){console.warn('MR tex fail:',e);}
          }
          if(mg._normTexBlob){
            try{mg.normTex=await decodeTex(mg._normTexBlob,'norm');mg._normTexBlob=null;pbrTexOK++;}catch(e){console.warn('norm tex fail:',e);}
          }
          if(mg._emTexBlob){
            try{mg.emTex=await decodeTex(mg._emTexBlob,'em');mg._emTexBlob=null;pbrTexOK++;}catch(e){console.warn('em tex fail:',e);}
          }
        }catch(e){console.error('Texture load error for group:',mg.matName,e);}
      }
      _cl('GLB: all tex done, base='+texOK+' pbr='+pbrTexOK);
      // Auto-detect PBR textures and show in UI
      let hasMR=false,hasNorm=false,hasEm=false;
      for(const mg of meshGroups){
        if(mg.mrTex) hasMR=true;
        if(mg.normTex) hasNorm=true;
        if(mg.emTex) hasEm=true;
      }
      document.getElementById('pbrSection').style.display=(hasMR||hasNorm||hasEm)?'block':'none';
      document.getElementById('mtRow').style.display=hasMR?'flex':'none';
      document.getElementById('rtRow').style.display=hasMR?'flex':'none';
      document.getElementById('normRow').style.display=hasNorm?'flex':'none';
      document.getElementById('emRow').style.display=hasEm?'flex':'none';
      if(hasMR){
        document.getElementById('mtStr').value=100;document.getElementById('mtStrN').value='1.00';pbrMetTexStr=1.0;
        document.getElementById('rtStr').value=100;document.getElementById('rtStrN').value='1.00';pbrRghTexStr=1.0;
      }
      if(hasNorm){document.getElementById('normStr').value=100;document.getElementById('normStrN').value='1.00';pbrNormStr=1.0;}
      if(hasEm){document.getElementById('emStr').value=100;document.getElementById('emStrN').value='1.00';pbrEmStr=1.0;}
      // Auto-set Met/Rgh sliders from first group's material factors
      var g0=parsed.groups[0];
      if(g0){
        pbrMetal=g0.metalFactor; pbrRough=g0.roughFactor;
        document.getElementById('mtlR').value=Math.round(pbrMetal*100);
        document.getElementById('mtl').value=pbrMetal.toFixed(2);
        document.getElementById('rghR').value=Math.round(pbrRough*100);
        document.getElementById('rgh').value=pbrRough.toFixed(2);
      }
      let info=glbFile.name+' ('+parsed.totalVerts.toLocaleString()+' verts, '+meshGroups.length+' groups)';
      if(texOK>0) info+=' tex:'+texOK+'✓';
      if(pbrTexOK>0) info+=' pbr:'+pbrTexOK+'✓';
      status.textContent=info;
      pivotX=pivotY=pivotZ=0; camD=3; oX=0.3; oY=0.5;
      var bh=modelBBox[4]-modelBBox[1];
      walkHeight=modelBBox[1]+Math.min(bh*0.3,1.0);
      syncWalkHeightUI();
      heatMin=modelBBox[1]; heatMax=modelBBox[4];
      syncHeatRange();
      _frameCnt=0; _cl('GLB: load complete, rendering...');
    }catch(e){ status.textContent='GLBエラー: '+e.message; }
    return;
  }

  // OBJ path
  const IMG_EXT=/\.(png|jpg|jpeg|bmp|gif|tga|tiff|webp)$/i;
  let objFile=null;const mtlFiles=[],allFiles=[];

  for(const f of files){
    allFiles.push(f);
    const lo=f.name.toLowerCase();
    if(lo.endsWith('.obj')&&!objFile) objFile=f;
    else if(lo.endsWith('.mtl')) mtlFiles.push(f);
  }

  if(!objFile){status.textContent='OBJ/GLBファイルが見つかりません';return;}

  // Log all discovered files
  log('=== Files ('+allFiles.length+') ===');
  log('OBJ: '+(objFile.webkitRelativePath||objFile.name));
  mtlFiles.forEach(f=>log('MTL: '+(f.webkitRelativePath||f.name)));
  let imgCount=0;
  for(const f of allFiles){
    if(IMG_EXT.test(f.name)){imgCount++;log('IMG: '+(f.webkitRelativePath||f.name));}
  }
  log('('+imgCount+' image files found)');

  // Build file lookup
  const lookup=buildFileLookup(allFiles);

  // Read MTL(s)
  let materials={};
  for(const mf of mtlFiles){
    const txt=await readTxt(mf);
    const parsed=parseMTL(txt);
    Object.assign(materials,parsed);
    log('--- MTL: '+mf.name+' ---');
    for(const k in parsed){
      log('  ['+k+'] Kd='+parsed[k].Kd.map(v=>v.toFixed(2))+' map="'+(parsed[k].map_Kd_raw||'none')+'"');
    }
  }

  // Read & parse OBJ
  const objTxt=await readTxt(objFile);
  const parsed=parseOBJ(objTxt,materials);
  modelSc=parsed.sc;
  upload(parsed.groups);

  if(parsed.mtlLib&&mtlFiles.length===0){
    log('⚠ OBJ references: '+parsed.mtlLib+' but no MTL found');
  }

  // Load textures with smart matching
  const texCache={};
  let texOK=0,texNG=0;

  log('--- Texture matching ---');
  for(const mg of meshGroups){
    if(!mg.mapFile&&!mg.mapFileRaw){
      log('  ['+mg.matName+'] no texture ref');
      continue;
    }

    const cacheKey=(mg.mapFileRaw||mg.mapFile).toLowerCase();
    log('  ['+mg.matName+'] needs: "'+(mg.mapFileRaw||mg.mapFile)+'"');

    if(texCache[cacheKey]){
      mg.tex=texCache[cacheKey]; texOK++;
      log('    -> cached ✓');
      continue;
    }

    const found=findFile(lookup, mg.mapFileRaw, mg.mapFile);
    if(!found){
      log('    -> ✗ NOT FOUND');
      log('    searched: name="'+mg.mapFile+'" raw="'+mg.mapFileRaw+'"');
      texNG++; continue;
    }

    log('    -> matched via '+found.method+': '+(found.file.webkitRelativePath||found.file.name));

    try{
      const img=await loadImg(found.file);
      log('    -> ✓ loaded '+img.width+'x'+img.height);
      const t=mkTex(img);
      texCache[cacheKey]=t;
      mg.tex=t;
      texOK++;
    }catch(err){
      log('    -> ✗ load error: '+err.message);
      texNG++;
    }
  }

  let info=objFile.name+' ('+parsed.totalVerts.toLocaleString()+' verts, '+meshGroups.length+' groups)';
  if(texOK>0) info+=' tex:'+texOK+'✓';
  if(texNG>0) info+=' ⚠:'+texNG;
  status.textContent=info;
  document.getElementById('pbrSection').style.display='none';
  var bh=modelBBox[4]-modelBBox[1];
  walkHeight=modelBBox[1]+Math.min(bh*0.3,1.0);
  syncWalkHeightUI();
  heatMin=modelBBox[1]; heatMax=modelBBox[4];
  syncHeatRange();
}

function readTxt(f){return new Promise((r,j)=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.onerror=()=>j(fr.error);fr.readAsText(f);});}
function loadImg(f){return new Promise((r,j)=>{const fr=new FileReader();fr.onload=()=>{const img=new Image();img.onload=()=>r(img);img.onerror=(e)=>j(new Error('img decode err'));img.src=fr.result;};fr.onerror=()=>j(new Error('read err'));fr.readAsDataURL(f);});}

  rY=(+document.getElementById('ry').value)*Math.PI/180;

  slider.addEventListener('input',()=>{num.value=slider.value;syncRot();});
  num.addEventListener('input',()=>{slider.value=num.value;syncRot();});
});

function bakeRotation(){
  if(rX===0&&rY===0&&rZ===0) return;
  var mdl=mul(mul(rZm(rZ),rYm(rY)),rXm(rX));
  var r00=mdl[0],r01=mdl[4],r02=mdl[8];
  var r10=mdl[1],r11=mdl[5],r12=mdl[9];
  var r20=mdl[2],r21=mdl[6],r22=mdl[10];

  for(var gi=0;gi<meshGroups.length;gi++){
    var mg=meshGroups[gi];
    // Rotate positions in-place
    var pos=mg._pos;
    for(var i=0;i<pos.length;i+=3){
      var x=pos[i],y=pos[i+1],z=pos[i+2];
      pos[i]=r00*x+r01*y+r02*z;
      pos[i+1]=r10*x+r11*y+r12*z;
      pos[i+2]=r20*x+r21*y+r22*z;
    }
    gl.bindBuffer(gl.ARRAY_BUFFER,mg.pb);
    gl.bufferSubData(gl.ARRAY_BUFFER,0,pos);

    // Rotate normals in-place
    var norm=mg._norm;
    if(norm){
      for(var i=0;i<norm.length;i+=3){
        var x=norm[i],y=norm[i+1],z=norm[i+2];
        norm[i]=r00*x+r01*y+r02*z;
        norm[i+1]=r10*x+r11*y+r12*z;
        norm[i+2]=r20*x+r21*y+r22*z;
      }
      gl.bindBuffer(gl.ARRAY_BUFFER,mg.nb);
      gl.bufferSubData(gl.ARRAY_BUFFER,0,norm);
    }

    // Rotate smooth normals in-place
    var sn=mg._snorm;
    if(sn&&mg.snb){
      for(var i=0;i<sn.length;i+=3){
        var x=sn[i],y=sn[i+1],z=sn[i+2];
        sn[i]=r00*x+r01*y+r02*z;
        sn[i+1]=r10*x+r11*y+r12*z;
        sn[i+2]=r20*x+r21*y+r22*z;
      }
      gl.bindBuffer(gl.ARRAY_BUFFER,mg.snb);
      gl.bufferSubData(gl.ARRAY_BUFFER,0,sn);
    }
    // Curvature is rotation-invariant — skip
  }

  // Recalculate bounding box
  modelBBox=[Infinity,Infinity,Infinity,-Infinity,-Infinity,-Infinity];
  for(var gi=0;gi<meshGroups.length;gi++){
    var p=meshGroups[gi]._pos;
    for(var i=0;i<p.length;i+=3){
      if(p[i]<modelBBox[0])modelBBox[0]=p[i];
      if(p[i+1]<modelBBox[1])modelBBox[1]=p[i+1];
      if(p[i+2]<modelBBox[2])modelBBox[2]=p[i+2];
      if(p[i]>modelBBox[3])modelBBox[3]=p[i];
      if(p[i+1]>modelBBox[4])modelBBox[4]=p[i+1];
      if(p[i+2]>modelBBox[5])modelBBox[5]=p[i+2];
    }
  }
  heatMin=modelBBox[1]; heatMax=modelBBox[4];
  syncHeatRange();

  // Reset clipping to full range
  ['cxMin','cyMin','czMin'].forEach(function(id){document.getElementById(id).value=-10;});
  ['cxMax','cyMax','czMax'].forEach(function(id){document.getElementById(id).value=10;});
  ['cxMinN','cyMinN','czMinN'].forEach(function(id){document.getElementById(id).value='-10.0';});
  ['cxMaxN','cyMaxN','czMaxN'].forEach(function(id){document.getElementById(id).value='10.0';});
  updateClip();

  // Reset rotation to 0
  rX=0; rY=0; rZ=0;
  ['rx','ry','rz'].forEach(function(id){
    document.getElementById(id).value='0';
    document.getElementById(id+'R').value='0';
  });
  _cl('bakeRotation: done');
}

function drawHeatLegend(){
  var show=(matMode==='heat');
  document.getElementById('heatLegend').style.display=show?'block':'none';
  document.getElementById('heatLegendLabels').style.display=show?'block':'none';
  if(!show) return;
  var cv=document.getElementById('heatLegend'),ctx=cv.getContext('2d');
  var w=cv.width,h=cv.height;
  ctx.clearRect(0,0,w,h);
  for(var y=0;y<h;y++){
    var t=1-y/h; // top=1, bottom=0
    var r,g,b;
    if(heatRamp===1){
      // warm-cool
      var cool=[26,51,204],mid=[242,242,242],warm=[204,26,26];
      if(t<0.5){var f=t*2;r=cool[0]+(mid[0]-cool[0])*f;g=cool[1]+(mid[1]-cool[1])*f;b=cool[2]+(mid[2]-cool[2])*f;}
      else{var f=(t-0.5)*2;r=mid[0]+(warm[0]-mid[0])*f;g=mid[1]+(warm[1]-mid[1])*f;b=mid[2]+(warm[2]-mid[2])*f;}
    } else if(heatRamp===2){
      var mt=monoInvert?1-t:t;
      r=g=b=mt*255;
    } else {
      // rainbow: match GLSL rampRainbow
      var sr=t>0.5?(t-0.5)/0.25:0; sr=Math.min(sr,1);
      if(t>0.9) sr+=((t-0.9)/0.1)*0.5;
      var sg=t>0?(t/0.25):0; sg=Math.min(sg,1); if(t>0.75) sg-=(t-0.75)/0.25; sg=Math.max(sg,0);
      var sb=t<0.5?1-(t-0.25)/0.25:0; if(t<0.25) sb=1; sb=Math.max(sb,0);
      r=Math.min(sr,1)*255; g=sg*255; b=sb*255;
    }
    ctx.fillStyle='rgb('+Math.round(r)+','+Math.round(g)+','+Math.round(b)+')';
    ctx.fillRect(0,y,w,1);
  }
  // Labels
  var labels=document.getElementById('heatLegendLabels');
  if(heatMode===1){
    document.getElementById('heatLMax').textContent=heatMax.toFixed(2);
    document.getElementById('heatLMid').textContent=((heatMin+heatMax)/2).toFixed(2);
    document.getElementById('heatLMin').textContent=heatMin.toFixed(2);
  } else if(heatMode===2){
    document.getElementById('heatLMax').textContent='垂直';
    document.getElementById('heatLMid').textContent='45°';
    document.getElementById('heatLMin').textContent='水平';
  } else {
    document.getElementById('heatLMax').textContent='高';
    document.getElementById('heatLMid').textContent='';
    document.getElementById('heatLMin').textContent='低';
  }
}

/* Camera Mode */
function syncWalkHeightUI(){
  var bh=(modelBBox[4]-modelBBox[1])||1;
  var pct=Math.round(Math.min(Math.max((walkHeight-modelBBox[1])/bh,0),1)*100);
  document.getElementById('fpHtR').value=pct;
  document.getElementById('fpHtN').value=walkHeight.toFixed(2);
}
function setCamMode(mode){
  var isFP=(mode==='walk'||mode==='fly');
  if(isFP&&camMode==='orbit'){
    var ex=camD*Math.sin(oY)*Math.cos(oX),ey=camD*Math.sin(oX),ez=camD*Math.cos(oY)*Math.cos(oX);
    wPosX=ex+pivotX;wPosY=ey+pivotY;wPosZ=ez+pivotZ;
    wYaw=oY+Math.PI;wPitch=oX;
  }
  if(mode==='walk') wPosY=walkHeight;
  camMode=mode;
  document.getElementById('camOrbit').classList.toggle('active',mode==='orbit');
  document.getElementById('camWalk').classList.toggle('active',mode==='walk');
  document.getElementById('camFly').classList.toggle('active',mode==='fly');
  document.getElementById('fpSpeedUI').style.display=isFP?'block':'none';
  document.getElementById('fpHtUI').style.display=mode==='walk'?'block':'none';
  document.getElementById('fpOverlay').style.display=isFP?'block':'none';
  document.getElementById('hSliderBase').style.display=mode==='fly'?'block':'none';
}

(function(){
  var sl=document.getElementById('fpHtR'),nm=document.getElementById('fpHtN');

/* Joystick + Height Slider (touch ID tracking) */
(function(){
  var base=document.getElementById('joyBase'),knob=document.getElementById('joyKnob');
  var hBase=document.getElementById('hSliderBase'),hKnob=document.getElementById('hSliderKnob');
  var joyTid=null,hTid=null;
  function ft(tl,id){for(var i=0;i<tl.length;i++)if(tl[i].identifier===id)return tl[i];return null;}
  function joyMove(cx,cy){
    var r=base.getBoundingClientRect(),bx=r.left+r.width/2,by=r.top+r.height/2;
    var dx=cx-bx,dy=cy-by,dist=Math.sqrt(dx*dx+dy*dy),maxR=r.width/2-26;
    if(dist>maxR){dx=dx/dist*maxR;dy=dy/dist*maxR;}
    knob.style.left=(r.width/2+dx)+'px';knob.style.top=(r.height/2+dy)+'px';
    joyX=dx/maxR;joyY=dy/maxR;
  }
  function joyEnd(){joyTid=null;joyX=joyY=0;knob.style.left='50%';knob.style.top='50%';knob.style.transform='translate(-50%,-50%)';}
  base.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();if(joyTid!==null)return;var t=e.changedTouches[0];joyTid=t.identifier;joyMove(t.clientX,t.clientY);knob.style.transform='translate(-50%,-50%)';},{passive:false});
  base.addEventListener('touchmove',function(e){e.preventDefault();e.stopPropagation();if(joyTid===null)return;var t=ft(e.touches,joyTid);if(t)joyMove(t.clientX,t.clientY);},{passive:false});
  base.addEventListener('touchend',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===joyTid){joyEnd();break;}},{passive:false});
  base.addEventListener('touchcancel',function(){joyEnd();});
  function hMove(cy){
    var r=hBase.getBoundingClientRect(),by=r.top+r.height/2,maxH=r.height/2-21;
    var dy=Math.max(-maxH,Math.min(maxH,cy-by));
    hKnob.style.top=(r.height/2+dy)+'px';hSliderVal=-dy/maxH;
  }
  function hEnd(){hTid=null;hSliderVal=0;hKnob.style.top='50%';hKnob.style.transform='translate(-50%,-50%)';}
  hBase.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();if(hTid!==null)return;var t=e.changedTouches[0];hTid=t.identifier;hMove(t.clientY);hKnob.style.transform='translate(-50%,-50%)';},{passive:false});
  hBase.addEventListener('touchmove',function(e){e.preventDefault();e.stopPropagation();if(hTid===null)return;var t=ft(e.touches,hTid);if(t)hMove(t.clientY);},{passive:false});
  hBase.addEventListener('touchend',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===hTid){hEnd();break;}},{passive:false});
  hBase.addEventListener('touchcancel',function(){hEnd();});
})();

const checkerTex=(()=>{
  const t=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,t);
  const s=16,d=new Uint8Array(s*s*4);
  for(let y=0;y<s;y++)for(let x=0;x<s;x++){
    const c=((x>>2)+(y>>2))%2===0?200:160;
    const i=(y*s+x)*4;d[i]=c;d[i+1]=c;d[i+2]=c;d[i+3]=255;
  }
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,s,s,0,gl.RGBA,gl.UNSIGNED_BYTE,d);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.REPEAT);

})();

// Ray-triangle intersection (Möller–Trumbore)
function rayTriIntersect(ro,rd,v0,v1,v2){
  var e1x=v1[0]-v0[0],e1y=v1[1]-v0[1],e1z=v1[2]-v0[2];
  var e2x=v2[0]-v0[0],e2y=v2[1]-v0[1],e2z=v2[2]-v0[2];
  var px=rd[1]*e2z-rd[2]*e2y, py=rd[2]*e2x-rd[0]*e2z, pz=rd[0]*e2y-rd[1]*e2x;
  var det=e1x*px+e1y*py+e1z*pz;
  if(Math.abs(det)<1e-10)return-1;
  var idet=1/det;
  var tx=ro[0]-v0[0],ty=ro[1]-v0[1],tz=ro[2]-v0[2];
  var u=(tx*px+ty*py+tz*pz)*idet;
  if(u<0||u>1)return-1;
  var qx=ty*e1z-tz*e1y,qy=tz*e1x-tx*e1z,qz=tx*e1y-ty*e1x;
  var v=(rd[0]*qx+rd[1]*qy+rd[2]*qz)*idet;
  if(v<0||u+v>1)return-1;
  var t=(e2x*qx+e2y*qy+e2z*qz)*idet;
  return t>1e-6?t:-1;
}

// Invert model matrix and transform ray into object space
function raycastMesh(sx,sy){
  // Screen to NDC
  var rect=canvas.getBoundingClientRect();
  var nx=(sx-rect.left)/rect.width*2-1;
  var ny=1-(sy-rect.top)/rect.height*2;

  // Build VP inverse
  var asp=canvas.width/canvas.height;
  var proj,view,eyePos;
  if(projMode==='ortho'){
    var s=camD*Math.tan(Math.PI/8);
    proj=ortho(-s*asp,s*asp,-s,s,.1,100);
  } else {
    proj=perspective(Math.PI/4,asp,.1,100);
  }
  var ex=camD*Math.sin(oY)*Math.cos(oX),ey=camD*Math.sin(oX),ez=camD*Math.cos(oY)*Math.cos(oX);
  eyePos=[ex+pivotX,ey+pivotY,ez+pivotZ];
  var up=Math.abs(oX)>Math.PI/2-0.01?[0,0,oX>0?-1:1]:[0,1,0];
  view=lookAt(eyePos,[pivotX,pivotY,pivotZ],up);
  var vp=mul(proj,view);
  var vpInv=mat4Inv(vp);
  if(!vpInv) return null;

  // Unproject near/far
  var near=mulVec4(vpInv,[nx,ny,-1,1]);
  var far=mulVec4(vpInv,[nx,ny,1,1]);
  var rdx=far[0]-near[0],rdy=far[1]-near[1],rdz=far[2]-near[2];
  var rl=Math.sqrt(rdx*rdx+rdy*rdy+rdz*rdz)||1;
  rdx/=rl;rdy/=rl;rdz/=rl;
  var ro=[near[0],near[1],near[2]], rd=[rdx,rdy,rdz];

  // Model matrix
  var mdl=mul(mul(rZm(rZ),rYm(rY)),rXm(rX));
  var mdlInv=mat4Inv(mdl);
  if(!mdlInv) return null;

  // Transform ray to object space
  var ro2=mulVec4(mdlInv,[ro[0],ro[1],ro[2],1]);
  var rdEnd=mulVec4(mdlInv,[ro[0]+rd[0],ro[1]+rd[1],ro[2]+rd[2],1]);
  var rd2=[rdEnd[0]-ro2[0],rdEnd[1]-ro2[1],rdEnd[2]-ro2[2]];
  var rl2=Math.sqrt(rd2[0]*rd2[0]+rd2[1]*rd2[1]+rd2[2]*rd2[2])||1;
  rd2[0]/=rl2;rd2[1]/=rl2;rd2[2]/=rl2;

  var bestT=Infinity, bestPt=null;
  for(var mi=0;mi<meshGroups.length;mi++){
    var mg=meshGroups[mi];
    var pos=mg._pos;
    if(!pos)continue;
    var nTris,getIdx;
    if(mg.ib){
      // Need original index array - stored in upload
      var idxArr=mg._idx;
      if(!idxArr)continue;
      nTris=mg.drawCount/3;
      getIdx=function(t,j){return idxArr[t*3+j];};
    } else {
      nTris=mg.count/3;
      getIdx=function(t,j){return t*3+j;};
    }
    for(var t=0;t<nTris;t++){
      var i0=getIdx(t,0),i1=getIdx(t,1),i2=getIdx(t,2);
      var v0=[pos[i0*3],pos[i0*3+1],pos[i0*3+2]];
      var v1=[pos[i1*3],pos[i1*3+1],pos[i1*3+2]];
      var v2=[pos[i2*3],pos[i2*3+1],pos[i2*3+2]];
      var tt=rayTriIntersect(ro2,rd2,v0,v1,v2);
      if(tt>0&&tt<bestT){bestT=tt;bestPt=[ro2[0]+rd2[0]*tt,ro2[1]+rd2[1]*tt,ro2[2]+rd2[2]*tt];}
    }
  }
  return bestPt;
}

function updateMeasBuf(){
  if(measBuf){gl.deleteBuffer(measBuf);measBuf=null;}
  if(measPts.length===0)return;
  var data=[];
  for(var i=0;i<measPts.length;i++) data.push(measPts[i][0],measPts[i][1],measPts[i][2]);
  measBuf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,measBuf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(data),gl.DYNAMIC_DRAW);
}

function drawMeasure(mvp){
  if(!measBuf||measPts.length===0)return;
  gl.useProgram(pWire);
  var a=gl.getAttribLocation(pWire,'aPos');
  gl.uniformMatrix4fv(gl.getUniformLocation(pWire,'uMVP'),false,mvp);
  // Draw points
  gl.bindBuffer(gl.ARRAY_BUFFER,measBuf);
  gl.enableVertexAttribArray(a);
  gl.vertexAttribPointer(a,3,gl.FLOAT,false,0,0);
  gl.uniform3f(gl.getUniformLocation(pWire,'uColor'),1,0.2,0.2);
  gl.uniform1f(gl.getUniformLocation(pWire,'uAlpha'),1.0);
  gl.drawArrays(gl.POINTS,0,measPts.length);
  gl.disableVertexAttribArray(a);
  // Draw thick line as screen-space quad
  if(measPts.length===2){
    var p0=measPts[0],p1=measPts[1];
    // Project both points to clip space
    function proj(p){return[
      mvp[0]*p[0]+mvp[4]*p[1]+mvp[8]*p[2]+mvp[12],
      mvp[1]*p[0]+mvp[5]*p[1]+mvp[9]*p[2]+mvp[13],
      mvp[2]*p[0]+mvp[6]*p[1]+mvp[10]*p[2]+mvp[14],
      mvp[3]*p[0]+mvp[7]*p[1]+mvp[11]*p[2]+mvp[15]];}
    var c0=proj(p0),c1=proj(p1);
    var ndc0=[c0[0]/c0[3],c0[1]/c0[3],c0[2]/c0[3]];
    var ndc1=[c1[0]/c1[3],c1[1]/c1[3],c1[2]/c1[3]];
    // Screen-space perpendicular (in NDC)
    var dx=ndc1[0]-ndc0[0], dy=ndc1[1]-ndc0[1];
    var len=Math.sqrt(dx*dx+dy*dy)||1e-6;
    var thickness=3.0/canvas.height*2; // 3 pixels in NDC
    var nx=-dy/len*thickness, ny=dx/len*thickness;
    // 4 corners of quad in NDC, convert back to clip space
    var verts=new Float32Array([
      (ndc0[0]+nx)*c0[3],(ndc0[1]+ny)*c0[3],ndc0[2]*c0[3],c0[3],
      (ndc0[0]-nx)*c0[3],(ndc0[1]-ny)*c0[3],ndc0[2]*c0[3],c0[3],
      (ndc1[0]+nx)*c1[3],(ndc1[1]+ny)*c1[3],ndc1[2]*c1[3],c1[3],
      (ndc1[0]-nx)*c1[3],(ndc1[1]-ny)*c1[3],ndc1[2]*c1[3],c1[3]]);
    // Use identity MVP, pass clip coords as position with w
    if(!measLineBuf) measLineBuf=gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER,measLineBuf);
    gl.bufferData(gl.ARRAY_BUFFER,verts,gl.DYNAMIC_DRAW);
    // Need a passthrough shader for vec4 clip coords
    gl.useProgram(pMeasLine);
    var aL=gl.getAttribLocation(pMeasLine,'aClip');
    gl.enableVertexAttribArray(aL);
    gl.vertexAttribPointer(aL,4,gl.FLOAT,false,0,0);
    gl.uniform3f(gl.getUniformLocation(pMeasLine,'uColor'),1,1,0);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    gl.disableVertexAttribArray(aL);
  }
}

function updateMeasLabel(mvp){

  var clip=[
    mvp[0]*mx+mvp[4]*my+mvp[8]*mz+mvp[12],
    mvp[1]*mx+mvp[5]*my+mvp[9]*mz+mvp[13],

  ];

const pCap=(()=>{
  const vs=`attribute vec3 aPos;uniform mat4 uMVP;varying vec3 vPos;void main(){vPos=aPos;gl_Position=uMVP*vec4(aPos,1);}`;
  const fs=`precision mediump float;varying vec3 vPos;uniform vec3 uCapColor,uClipMin,uClipMax;
void main(){
  if(vPos.x<uClipMin.x||vPos.x>uClipMax.x||vPos.y<uClipMin.y||vPos.y>uClipMax.y||vPos.z<uClipMin.z||vPos.z>uClipMax.z) discard;
  gl_FragColor=vec4(uCapColor,1);
}`;
  return lnk(vs,fs);
})();

// Stencil quad buffer (large quad, will be positioned per clip plane)
const capQuadBuf=gl.createBuffer();

function buildCapQuad(axis,val,isMin){
  // axis: 0=X, 1=Y, 2=Z. isMin: true=clipMin face, false=clipMax face
  const S=5;
  var a,b,c,d;
  if(axis===0){      a=[val,-S,-S]; b=[val,S,-S]; c=[val,S,S]; d=[val,-S,S]; }
  else if(axis===1){ a=[-S,val,-S]; b=[S,val,-S]; c=[S,val,S]; d=[-S,val,S]; }
  else{              a=[-S,-S,val]; b=[S,-S,val]; c=[S,S,val]; d=[-S,S,val]; }
  var verts;
  if(isMin) verts=new Float32Array([...a,...b,...c,...a,...c,...d]);
  else      verts=new Float32Array([...a,...c,...b,...a,...d,...c]);
  gl.bindBuffer(gl.ARRAY_BUFFER,capQuadBuf);
  gl.bufferData(gl.ARRAY_BUFFER,verts,gl.DYNAMIC_DRAW);
}

function drawCapPlanes(meshGroups,mvp){
  var bb=modelBBox;
  var planes=[];
  if(clipMin[0]>bb[0]+0.001) planes.push([0,clipMin[0],true]);
  if(clipMax[0]<bb[3]-0.001) planes.push([0,clipMax[0],false]);
  if(clipMin[1]>bb[1]+0.001) planes.push([1,clipMin[1],true]);
  if(clipMax[1]<bb[4]-0.001) planes.push([1,clipMax[1],false]);
  if(clipMin[2]>bb[2]+0.001) planes.push([2,clipMin[2],true]);
  if(clipMax[2]<bb[5]-0.001) planes.push([2,clipMax[2],false]);
  if(planes.length===0) return;

  gl.useProgram(pCap);
  var aLoc=gl.getAttribLocation(pCap,'aPos');
  if(aLoc<0) return;

  for(var pi=0;pi<planes.length;pi++){
    var axis=planes[pi][0], val=planes[pi][1], isMin=planes[pi][2];

    var stMin=[-999,-999,-999], stMax=[999,999,999];
    if(isMin) stMin[axis]=val; else stMax[axis]=val;

    // Step 1: Stencil pass
    gl.enable(gl.STENCIL_TEST);
    gl.clear(gl.STENCIL_BUFFER_BIT);
    gl.stencilFunc(gl.ALWAYS,0,0xFF);
    gl.stencilOpSeparate(gl.FRONT,gl.KEEP,gl.KEEP,gl.INCR_WRAP);
    gl.stencilOpSeparate(gl.BACK,gl.KEEP,gl.KEEP,gl.DECR_WRAP);
    gl.colorMask(false,false,false,false);
    gl.depthMask(false);
    gl.disable(gl.DEPTH_TEST);
    gl.disable(gl.CULL_FACE);

    gl.useProgram(pCap);
    gl.uniform3fv(gl.getUniformLocation(pCap,'uClipMin'),stMin);
    gl.uniform3fv(gl.getUniformLocation(pCap,'uClipMax'),stMax);
    gl.uniformMatrix4fv(gl.getUniformLocation(pCap,'uMVP'),false,mvp);
    for(var mi=0;mi<meshGroups.length;mi++){
      var mg=meshGroups[mi];
      if(!mg.pb) continue;
      gl.bindBuffer(gl.ARRAY_BUFFER,mg.pb);gl.enableVertexAttribArray(aLoc);gl.vertexAttribPointer(aLoc,3,gl.FLOAT,false,0,0);
      if(mg.ib){
        gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,mg.ib);
        gl.drawElements(gl.TRIANGLES,mg.drawCount,mg.ibType,0);
      } else {
        gl.drawArrays(gl.TRIANGLES,0,mg.count);
      }
      gl.disableVertexAttribArray(aLoc);
    }

    // Step 2: Draw cap quad where stencil != 0
    gl.colorMask(true,true,true,true);
    gl.depthMask(true);
    gl.enable(gl.DEPTH_TEST);
    gl.depthFunc(gl.LEQUAL);
    gl.stencilFunc(gl.NOTEQUAL,0,0xFF);
    gl.stencilOp(gl.KEEP,gl.KEEP,gl.KEEP);

    buildCapQuad(axis,val,isMin);
    gl.useProgram(pCap);
    gl.bindBuffer(gl.ARRAY_BUFFER,capQuadBuf);gl.enableVertexAttribArray(aLoc);gl.vertexAttribPointer(aLoc,3,gl.FLOAT,false,0,0);
    gl.uniformMatrix4fv(gl.getUniformLocation(pCap,'uMVP'),false,mvp);
    gl.uniform3fv(gl.getUniformLocation(pCap,'uCapColor'),capColor);
    gl.uniform3fv(gl.getUniformLocation(pCap,'uClipMin'),clipMin);
    gl.uniform3fv(gl.getUniformLocation(pCap,'uClipMax'),clipMax);
    gl.drawArrays(gl.TRIANGLES,0,6);
    gl.disableVertexAttribArray(aLoc);

    gl.disable(gl.STENCIL_TEST);
    gl.depthFunc(gl.LESS);
  }
}

function drawWire(mg,mvp){
  if(!mg.wib) return;
  gl.useProgram(pWire);
  const a=gl.getAttribLocation(pWire,'aPos');
  gl.bindBuffer(gl.ARRAY_BUFFER,mg.pb);gl.enableVertexAttribArray(a);gl.vertexAttribPointer(a,3,gl.FLOAT,false,0,0);
  gl.uniformMatrix4fv(gl.getUniformLocation(pWire,'uMVP'),false,mvp);
  const wc=bgMode==='white'?[.2,.2,.2]:[.9,.9,.9];
  gl.uniform3fv(gl.getUniformLocation(pWire,'uColor'),wc);
  gl.uniform1f(gl.getUniformLocation(pWire,'uAlpha'),1.0);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,mg.wib);
  gl.drawElements(gl.LINES,mg.wibCount,mg.wibType,0);
  gl.disableVertexAttribArray(a);
}
