/* ============================================================
   Touch / Mouse — 1-finger orbit, 2-finger pinch zoom + pan
   ============================================================ */
let tSX=0,tSY=0,pOX=0,pOY=0;
let pinchDist0=0,pinchCamD0=3,pinchMidX0=0,pinchMidY0=0,pivX0=0,pivY0=0,pivZ0=0;
let wasPinch=false, pinchEndTime=0, orbitReady=false;
let _dtapTime=0, _dtapX=0, _dtapY=0;

canvas.addEventListener('touchstart',function(e){
  if(e.target!==canvas)return;
  e.preventDefault();
  var tt=e.targetTouches;
  if(tt.length===1){
    tSX=tt[0].clientX; tSY=tt[0].clientY;
    pOX=oX; pOY=oY;
    orbitReady=(Date.now()-pinchEndTime>=500);
    wasPinch=false;
    if(camMode==='orbit'&&!measMode){
      var now=Date.now();
      var ddx=tSX-_dtapX, ddy=tSY-_dtapY;
      if(now-_dtapTime<350 && ddx*ddx+ddy*ddy<400){doDoubleTap(tSX,tSY);_dtapTime=0;}
      else{_dtapTime=now;_dtapX=tSX;_dtapY=tSY;}
    }
  } else if(tt.length===2){
    wasPinch=true;orbitReady=false;
    const dx=tt[0].clientX-tt[1].clientX,dy=tt[0].clientY-tt[1].clientY;
    pinchDist0=Math.sqrt(dx*dx+dy*dy);pinchCamD0=camD;
    pinchMidX0=(tt[0].clientX+tt[1].clientX)/2;pinchMidY0=(tt[0].clientY+tt[1].clientY)/2;
    pivX0=pivotX;pivY0=pivotY;pivZ0=pivotZ;
  }
},{passive:false});

canvas.addEventListener('touchmove',function(e){
  if(e.target!==canvas)return;
  e.preventDefault();
  var tt=e.targetTouches;
  if(camMode==='walk'||camMode==='fly'){
    if(tt.length>=1){
      wYaw+=(tt[0].clientX-tSX)*.0025;
      wPitch+=(tt[0].clientY-tSY)*.0025;
      wPitch=Math.max(-1.5,Math.min(1.5,wPitch));
      tSX=tt[0].clientX;tSY=tt[0].clientY;
    }
  } else {
    if(tt.length===1&&!wasPinch){
      if(!orbitReady){tSX=tt[0].clientX;tSY=tt[0].clientY;pOX=oX;pOY=oY;orbitReady=true;return;}
      if(probeOn){
        probeAz+=(tt[0].clientX-tSX)*.01;
        probeEl+=(tt[0].clientY-tSY)*.01;
        probeEl=Math.max(-1.55,Math.min(1.55,probeEl));
        tSX=tt[0].clientX;tSY=tt[0].clientY;
      } else if(!activeView){
        oX=pOX+(tt[0].clientY-tSY)*.01;oY=pOY-(tt[0].clientX-tSX)*.01;
        oX=Math.max(-1.55,Math.min(1.55,oX));
      }
    } else if(tt.length===2){
      const dx=tt[0].clientX-tt[1].clientX,dy=tt[0].clientY-tt[1].clientY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      camD=Math.max(0.3,Math.min(20,pinchCamD0*(pinchDist0/dist)));
      const midX=(tt[0].clientX+tt[1].clientX)/2,midY=(tt[0].clientY+tt[1].clientY)/2;
      const dmx=midX-pinchMidX0,dmy=midY-pinchMidY0,scale=camD*0.003;
      var sinY=Math.sin(oY),cosY=Math.cos(oY);
      pivotX=pivX0+dmx*scale*(-cosY);pivotZ=pivZ0+dmx*scale*sinY;pivotY=pivY0+dmy*scale;
    }
  }
},{passive:false});

canvas.addEventListener('touchend',function(e){
  if(wasPinch){pinchEndTime=Date.now();if(e.touches.length===0)wasPinch=false;}
},{passive:false});

/* ============================================================
   Double-tap raycast → set pivot
   ============================================================ */
function doDoubleTap(sx,sy){
  if(meshGroups.length===0||!meshGroups[0]._pos)return;
  var rect=canvas.getBoundingClientRect();
  var nx=(sx-rect.left)/rect.width*2-1;
  var ny=1-(sy-rect.top)/rect.height*2;
  var asp=canvas.width/canvas.height;
  var proj=perspective(Math.PI/4,asp,.1,100);
  var ex=camD*Math.sin(oY)*Math.cos(oX),ey=camD*Math.sin(oX),ez=camD*Math.cos(oY)*Math.cos(oX);
  var eye=[ex+pivotX,ey+pivotY,ez+pivotZ];
  var dup=Math.abs(oX)>Math.PI/2-0.01?[0,0,oX>0?-1:1]:[0,1,0];
  var vw=lookAt(eye,[pivotX,pivotY,pivotZ],dup);
  var vp=mul(proj,vw);
  var ivp=mat4Inv(vp); if(!ivp)return;
  var near=mulVec4(ivp,[nx,ny,-1,1]);
  var far=mulVec4(ivp,[nx,ny,1,1]);
  var rd=[far[0]-near[0],far[1]-near[1],far[2]-near[2]];
  var rl=Math.sqrt(rd[0]*rd[0]+rd[1]*rd[1]+rd[2]*rd[2])||1;
  rd[0]/=rl;rd[1]/=rl;rd[2]/=rl;
  var mdl=mul(mul(rZm(rZ),rYm(rY)),rXm(rX));
  var imdl=mat4Inv(mdl); if(!imdl)return;
  var mro=mulVec4(imdl,[near[0],near[1],near[2],1]);
  var mfar=mulVec4(imdl,[far[0],far[1],far[2],1]);
  var mrd=[mfar[0]-mro[0],mfar[1]-mro[1],mfar[2]-mro[2]];
  var mrl=Math.sqrt(mrd[0]*mrd[0]+mrd[1]*mrd[1]+mrd[2]*mrd[2])||1;
  mrd[0]/=mrl;mrd[1]/=mrl;mrd[2]/=mrl;
  var bestT=1e30,hit=null;
  for(var gi=0;gi<meshGroups.length;gi++){
    var P=meshGroups[gi]._pos;
    for(var i=0;i<P.length;i+=9){
      var t=rayTri(mro,mrd,P[i],P[i+1],P[i+2],P[i+3],P[i+4],P[i+5],P[i+6],P[i+7],P[i+8]);
      if(t!==null&&t<bestT){bestT=t;hit=[mro[0]+mrd[0]*t,mro[1]+mrd[1]*t,mro[2]+mrd[2]*t];}
    }
  }
  if(!hit)return;
  var wh=mulVec4(mdl,[hit[0],hit[1],hit[2],1]);
  pivotX=wh[0];pivotY=wh[1];pivotZ=wh[2];
}

function rayTri(ro,rd,ax,ay,az,bx,by,bz,cx,cy,cz){
  var ex1=bx-ax,ey1=by-ay,ez1=bz-az;
  var ex2=cx-ax,ey2=cy-ay,ez2=cz-az;
  var px=rd[1]*ez2-rd[2]*ey2,py=rd[2]*ex2-rd[0]*ez2,pz=rd[0]*ey2-rd[1]*ex2;
  var det=ex1*px+ey1*py+ez1*pz;
  if(det>-1e-8&&det<1e-8)return null;
  var idet=1/det;
  var tx=ro[0]-ax,ty=ro[1]-ay,tz=ro[2]-az;
  var u=(tx*px+ty*py+tz*pz)*idet;
  if(u<0||u>1)return null;
  var qx=ty*ez1-tz*ey1,qy=tz*ex1-tx*ez1,qz=tx*ey1-ty*ex1;
  var v=(rd[0]*qx+rd[1]*qy+rd[2]*qz)*idet;
  if(v<0||u+v>1)return null;
  var t=(ex2*qx+ey2*qy+ez2*qz)*idet;
  return t>1e-6?t:null;
}

function mat4Inv(m){
  var a=m[0],b=m[1],c=m[2],d=m[3],e=m[4],f=m[5],g=m[6],h=m[7];
  var i=m[8],j=m[9],k=m[10],l=m[11],M=m[12],n=m[13],o=m[14],p=m[15];
  var q=a*f-b*e,r=a*g-c*e,s=a*h-d*e,t=b*g-c*f;
  var u=b*h-d*f,v=c*h-d*g,w=i*n-j*M,x=i*o-k*M;
  var y=i*p-l*M,z=j*o-k*n,A=j*p-l*n,B=k*p-l*o;
  var det=q*B-r*A+s*z+t*y-u*x+v*w;
  if(Math.abs(det)<1e-10)return null;
  var id=1/det;
  return new Float32Array([
    (f*B-g*A+h*z)*id,(c*A-b*B-d*z)*id,(n*v-o*u+p*t)*id,(k*u-j*v-l*t)*id,
    (g*y-e*B-h*x)*id,(a*B-c*y+d*x)*id,(o*s-M*v-p*r)*id,(i*v-k*s+l*r)*id,
    (e*A-f*y+h*w)*id,(b*y-a*A-d*w)*id,(M*u-n*s+p*q)*id,(j*s-i*u-l*q)*id,
    (f*x-e*z-g*w)*id,(a*z-b*x+c*w)*id,(n*r-M*t-o*q)*id,(i*t-j*r+k*q)*id]);
}

function mulVec4(m,v){
  var x=m[0]*v[0]+m[4]*v[1]+m[8]*v[2]+m[12]*v[3];
  var y=m[1]*v[0]+m[5]*v[1]+m[9]*v[2]+m[13]*v[3];
  var z=m[2]*v[0]+m[6]*v[1]+m[10]*v[2]+m[14]*v[3];
  var w=m[3]*v[0]+m[7]*v[1]+m[11]*v[2]+m[15]*v[3];
  if(Math.abs(w)>1e-10){x/=w;y/=w;z/=w;}
  return[x,y,z];
}

canvas.addEventListener('wheel',e=>{
  if(camMode==='walk'||camMode==='fly'){
    var fwd=-e.deltaY*walkSpeed*0.01;
    var sY=Math.sin(wYaw),cY=Math.cos(wYaw);
    if(camMode==='fly'){
      var sP=Math.sin(wPitch),cP=Math.cos(wPitch);
      wPosX+=sY*cP*fwd;wPosY+=-sP*fwd;wPosZ+=cY*cP*fwd;
    } else {
      wPosX+=sY*fwd;wPosZ+=cY*fwd;
    }
  } else {
    camD=Math.max(1,Math.min(20,camD+e.deltaY*.01));
  }
  e.preventDefault();
},{passive:false});

/* ============================================================
   Render
   ============================================================ */
function drawG(mg,prog,mvp,model,mv,nm,eye){
  if(!prog||!mg.pb)return;
  if(_frameCnt<2) _cl('drawG: mode='+matMode+' hasTex='+(!!mg.tex)+' hasMR='+(!!mg.mrTex)+' hasNorm='+(!!mg.normTex)+' hasEm='+(!!mg.emTex));
  gl.useProgram(prog);
  const aP=gl.getAttribLocation(prog,'aPos');
  if(aP<0)return;
  gl.bindBuffer(gl.ARRAY_BUFFER,mg.pb);gl.enableVertexAttribArray(aP);gl.vertexAttribPointer(aP,3,gl.FLOAT,false,0,0);
  const aN=gl.getAttribLocation(prog,'aNorm');
  if(aN>=0){const useNb=(normalMode==='smooth'&&mg.snb)?mg.snb:mg.nb;gl.bindBuffer(gl.ARRAY_BUFFER,useNb);gl.enableVertexAttribArray(aN);gl.vertexAttribPointer(aN,3,gl.FLOAT,false,0,0);}
  const aU=gl.getAttribLocation(prog,'aUV');
  if(aU>=0){gl.bindBuffer(gl.ARRAY_BUFFER,mg.ub);gl.enableVertexAttribArray(aU);gl.vertexAttribPointer(aU,2,gl.FLOAT,false,0,0);}
  const aC=gl.getAttribLocation(prog,'aCurv');
  if(aC>=0){
    if(mg.cb){gl.bindBuffer(gl.ARRAY_BUFFER,mg.cb);gl.enableVertexAttribArray(aC);gl.vertexAttribPointer(aC,1,gl.FLOAT,false,0,0);}
    else{gl.disableVertexAttribArray(aC);gl.vertexAttrib1f(aC,0.0);}
  }

  gl.uniformMatrix4fv(gl.getUniformLocation(prog,'uMVP'),false,mvp);
  let loc;
  loc=gl.getUniformLocation(prog,'uModel');if(loc)gl.uniformMatrix4fv(loc,false,model);
  loc=gl.getUniformLocation(prog,'uMV');if(loc)gl.uniformMatrix4fv(loc,false,mv);
  loc=gl.getUniformLocation(prog,'uNorm');if(loc)gl.uniformMatrix3fv(loc,false,nm);
  loc=gl.getUniformLocation(prog,'uClipMin');if(loc)gl.uniform3fv(loc,clipMin);
  loc=gl.getUniformLocation(prog,'uClipMax');if(loc)gl.uniform3fv(loc,clipMax);
  loc=gl.getUniformLocation(prog,'uFlatShade');if(loc)gl.uniform1i(loc,normalMode==='flat'?1:0);

  if(matMode==='matcap'){
    gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,mcTex);
    gl.uniform1i(gl.getUniformLocation(prog,'uMatcap'),0);
  } else {
    const has=!!mg.tex;
    gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,has?mg.tex:defTex);
    gl.uniform1i(gl.getUniformLocation(prog,'uTex'),0);
    gl.uniform1i(gl.getUniformLocation(prog,'uHasTex'),has?1:0);
    loc=gl.getUniformLocation(prog,'uKd');if(loc)gl.uniform3fv(loc,mg.kd);
    if(matMode==='lit'||matMode==='heat'){
      if(probeOn){
        // Point light probe - position based on direction + depth
        var px=Math.sin(probeAz)*Math.cos(probeEl);
        var py=Math.sin(probeEl);
        var pz=Math.cos(probeAz)*Math.cos(probeEl);
        var pl=Math.sqrt(px*px+py*py+pz*pz)||1;
        px/=pl;py/=pl;pz/=pl;
        // Distance: depth 0=at surface(0.01), depth 10=far(5)
        var dist=0.01+probeDepth*0.5;
        var cx=(modelBBox[0]+modelBBox[3])/2, cy=(modelBBox[1]+modelBBox[4])/2, cz=(modelBBox[2]+modelBBox[5])/2;
        var probePos=[cx+px*dist, cy+py*dist, cz+pz*dist];
        gl.uniform1i(gl.getUniformLocation(prog,'uProbeOn'),1);
        gl.uniform3fv(gl.getUniformLocation(prog,'uProbePos'),probePos);
        var pc=probeColor;
        var fillStr=0.15*probeInt;
        gl.uniform3fv(gl.getUniformLocation(prog,'uLD[0]'),[px,py,pz, -px,-py,-pz, 0,1,0]);
        gl.uniform3fv(gl.getUniformLocation(prog,'uLC[0]'),[pc[0]*probeInt,pc[1]*probeInt,pc[2]*probeInt, pc[0]*fillStr,pc[1]*fillStr,pc[2]*fillStr, 0,0,0]);
        gl.uniform3fv(gl.getUniformLocation(prog,'uAmb'),[0.03,0.03,0.03]);
      } else {
        gl.uniform1i(gl.getUniformLocation(prog,'uProbeOn'),0);
        const l=LP[lightIdx];
        gl.uniform3fv(gl.getUniformLocation(prog,'uLD[0]'),l.d.map(nrm).flat());
        var scaledC=l.c.map(function(c){return[c[0]*lightIntensity,c[1]*lightIntensity,c[2]*lightIntensity];});
        gl.uniform3fv(gl.getUniformLocation(prog,'uLC[0]'),scaledC.flat());
        var scaledA=[l.a[0]*lightIntensity,l.a[1]*lightIntensity,l.a[2]*lightIntensity];
        gl.uniform3fv(gl.getUniformLocation(prog,'uAmb'),scaledA);
      }
      loc=gl.getUniformLocation(prog,'uEye');if(loc)gl.uniform3fv(loc,eye);
      loc=gl.getUniformLocation(prog,'uMetal');if(loc)gl.uniform1f(loc,pbrMetal);
      loc=gl.getUniformLocation(prog,'uSpec');if(loc)gl.uniform1f(loc,pbrSpec);
      loc=gl.getUniformLocation(prog,'uRough');if(loc)gl.uniform1f(loc,pbrRough);
      // PBR textures
      const hasMR=!!mg.mrTex;
      gl.activeTexture(gl.TEXTURE1);gl.bindTexture(gl.TEXTURE_2D,hasMR?mg.mrTex:defTex);
      gl.uniform1i(gl.getUniformLocation(prog,'uMRTex'),1);
      gl.uniform1i(gl.getUniformLocation(prog,'uHasMR'),hasMR?1:0);
      loc=gl.getUniformLocation(prog,'uMetTexStr');if(loc)gl.uniform1f(loc,pbrMetTexStr);
      loc=gl.getUniformLocation(prog,'uRghTexStr');if(loc)gl.uniform1f(loc,pbrRghTexStr);
      const hasNorm=!!mg.normTex;
      gl.activeTexture(gl.TEXTURE2);gl.bindTexture(gl.TEXTURE_2D,hasNorm?mg.normTex:defTex);
      gl.uniform1i(gl.getUniformLocation(prog,'uNormTex'),2);
      gl.uniform1i(gl.getUniformLocation(prog,'uHasNorm'),hasNorm?1:0);
      loc=gl.getUniformLocation(prog,'uNormStr');if(loc)gl.uniform1f(loc,pbrNormStr);
      loc=gl.getUniformLocation(prog,'uNormFlipY');if(loc)gl.uniform1f(loc,normFlipY);
      const hasEm=!!mg.emTex;
      gl.activeTexture(gl.TEXTURE3);gl.bindTexture(gl.TEXTURE_2D,hasEm?mg.emTex:defTex);
      gl.uniform1i(gl.getUniformLocation(prog,'uEmTex'),3);
      gl.uniform1i(gl.getUniformLocation(prog,'uHasEm'),hasEm?1:0);
      loc=gl.getUniformLocation(prog,'uEmStr');if(loc)gl.uniform1f(loc,pbrEmStr);
      // Heat uniforms
      loc=gl.getUniformLocation(prog,'uHeatMode');if(loc)gl.uniform1i(loc,matMode==='heat'?heatMode:0);
      loc=gl.getUniformLocation(prog,'uHeatMin');if(loc)gl.uniform1f(loc,heatMin);
      loc=gl.getUniformLocation(prog,'uHeatMax');if(loc)gl.uniform1f(loc,heatMax);
      loc=gl.getUniformLocation(prog,'uRampType');if(loc)gl.uniform1i(loc,heatRamp);
      loc=gl.getUniformLocation(prog,'uHeatBlend');if(loc)gl.uniform1f(loc,heatBlend);
      loc=gl.getUniformLocation(prog,'uCurvSens');if(loc)gl.uniform1f(loc,heatCurvSens);
      loc=gl.getUniformLocation(prog,'uMonoInvert');if(loc)gl.uniform1i(loc,monoInvert);
    }
  }
  if(mg.ib){
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,mg.ib);
    gl.drawElements(gl.TRIANGLES,mg.drawCount,mg.ibType,0);
  } else {
    gl.drawArrays(gl.TRIANGLES,0,mg.count);
  }
  if(aP>=0)gl.disableVertexAttribArray(aP);
  if(aN>=0)gl.disableVertexAttribArray(aN);
  if(aU>=0)gl.disableVertexAttribArray(aU);
  if(aC>=0&&mg.cb)gl.disableVertexAttribArray(aC);
}

function frame(){
  try{
  resize();
  if(bgMode==='checker'){
    gl.clearColor(0,0,0,1);
    gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT|gl.STENCIL_BUFFER_BIT);
    drawChecker();
    gl.clear(gl.DEPTH_BUFFER_BIT);
  } else {
    const bg=BG[bgMode];
    gl.clearColor(bg[0],bg[1],bg[2],1);
    gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT|gl.STENCIL_BUFFER_BIT);
  }
  gl.enable(gl.DEPTH_TEST);

  const asp=canvas.width/canvas.height;
  let proj,view,eyePos;

  if(camMode==='walk'||camMode==='fly'){
    // Joystick movement
    if(joyX!==0||joyY!==0){
      var sY=Math.sin(wYaw),cY=Math.cos(wYaw);
      var fwd=-joyY*walkSpeed*0.05,str=-joyX*walkSpeed*0.05;
      if(camMode==='fly'){
        // Fly: forward follows pitch
        var sP=Math.sin(wPitch),cP=Math.cos(wPitch);
        wPosX+=sY*cP*fwd+cY*str;
        wPosY+=-sP*fwd;
        wPosZ+=cY*cP*fwd-sY*str;
      } else {
        // Walk: horizontal only
        wPosX+=sY*fwd+cY*str;wPosZ+=cY*fwd-sY*str;
      }
    }
    if(camMode==='fly'&&hSliderVal!==0) wPosY+=hSliderVal*walkSpeed*0.03;
    if(camMode==='walk') wPosY=walkHeight;
    proj=perspective(Math.PI/3,asp,.01,200);
    var sY=Math.sin(wYaw),cY=Math.cos(wYaw),sP=Math.sin(wPitch),cP=Math.cos(wPitch);
    eyePos=[wPosX,wPosY,wPosZ];
    view=lookAt(eyePos,[wPosX+sY*cP,wPosY-sP,wPosZ+cY*cP],[0,1,0]);
  } else {
    if(projMode==='ortho'){
      const s=camD*Math.tan(Math.PI/8);
      proj=ortho(-s*asp,s*asp,-s,s,.1,100);
    } else {
      proj=perspective(Math.PI/4,asp,.1,100);
    }
    const ex=camD*Math.sin(oY)*Math.cos(oX),ey=camD*Math.sin(oX),ez=camD*Math.cos(oY)*Math.cos(oX);
    eyePos=[ex+pivotX,ey+pivotY,ez+pivotZ];
    var up=Math.abs(oX)>Math.PI/2-0.01?[0,0,oX>0?-1:1]:[0,1,0];
    view=lookAt(eyePos,[pivotX,pivotY,pivotZ],up);
  }
  const vp=mul(proj,view);

  if(meshGroups.length>0){
    const mdl=mul(mul(rZm(rZ),rYm(rY)),rXm(rX));
    const mv=mul(view,mdl),mvp=mul(proj,mv),nm=normMat3(mdl);
    let prog=matMode==='matcap'?pMC:matMode==='unlit'?pUnlit:pLit;
    // Model first (with clipping) — fills depth buffer
    for(const mg of meshGroups) drawG(mg,prog,mvp,mdl,mv,nm,eyePos);
    // Cap planes after — draws where stencil non-zero AND closer than existing depth
    drawCapPlanes(meshGroups,mvp);
    if(wireOn&&wireMix>0){
      // Fade model toward background by drawing bg-colored fullscreen quad
      var bgC=BG[bgMode]||[0,0,0];
      gl.disable(gl.DEPTH_TEST);
      gl.enable(gl.BLEND);
      gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
      gl.useProgram(pWire);
      var aF=gl.getAttribLocation(pWire,'aPos');
      gl.bindBuffer(gl.ARRAY_BUFFER,fadeQuadBuf);
      gl.enableVertexAttribArray(aF);
      gl.vertexAttribPointer(aF,3,gl.FLOAT,false,0,0);
      gl.uniformMatrix4fv(gl.getUniformLocation(pWire,'uMVP'),false,m4());
      gl.uniform3fv(gl.getUniformLocation(pWire,'uColor'),bgC);
      gl.uniform1f(gl.getUniformLocation(pWire,'uAlpha'),wireMix);
      gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
      gl.disableVertexAttribArray(aF);
      // Draw wireframe on top
      gl.enable(gl.DEPTH_TEST);
      gl.depthFunc(gl.LEQUAL);
      for(const mg of meshGroups) drawWire(mg,mvp);
      gl.disable(gl.BLEND);
      gl.depthFunc(gl.LESS);
    }
    // Measurement overlay
    gl.depthFunc(gl.ALWAYS);
    drawMeasure(mvp);
    gl.depthFunc(gl.LESS);
    updateMeasLabel(mvp);
  }
  }catch(e){
    document.getElementById('status').textContent='描画エラー: '+e.message;
    console.error('frame error:',e);
    _cl('[FRAME ERR] '+e.message+'\n'+e.stack);
  }
  if(++_frameCnt===30) _clDone(); // stable after 30 frames
  requestAnimationFrame(frame);
}
var _frameCnt=0;
requestAnimationFrame(frame);
</script>
</body>
